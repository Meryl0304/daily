<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>凝神 · 完整页面对比</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: -apple-system, "Segoe UI", sans-serif; background:#111; padding:16px; }
h2 { text-align:center; font-size:13px; color:#666; margin:20px 0 12px; }
.wrap { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.card { width:340px; border-radius:20px; padding:20px 16px 24px; overflow:hidden; }

/* ====== 共享 ====== */
.task-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; font-size:13px; margin-bottom:4px; }
.task-item .play { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0; }
.task-item .name { flex:1; }
.task-item .meta { font-size:11px; opacity:.6; }
.stats-tabs { display:flex; gap:4px; margin-bottom:8px; }
.stats-tab { padding:4px 12px;border-radius:12px;font-size:11px;cursor:pointer; }
.section-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; opacity:.5; margin-bottom:6px; }
.btn-free { padding:8px 20px; border-radius:18px; font-size:13px; cursor:pointer; background:transparent; display:inline-block; margin-bottom:12px; }
.smart-badge { font-size:16px; opacity:.5; cursor:pointer; }

/* ====== A: 深夜玻璃 ====== */
.glass-card { background: linear-gradient(160deg, #191628, #1e1a30); color:#e0d8f0; }
.glass-card .task-item { background:rgba(255,255,255,.03); }
.glass-card .task-item .play { background:rgba(140,120,200,.2); color:#b0a0d8; }
.glass-card .task-item .play.done-play { background:rgba(100,180,130,.2); color:#80c090; }
.glass-card .stats-tab { color:rgba(200,190,220,.5); border:1px solid rgba(255,255,255,.06); }
.glass-card .stats-tab.on { background:rgba(255,255,255,.06); color:#c8c0e0; border-color:rgba(255,255,255,.1); }
.glass-card .btn-free { border:1.5px dashed rgba(200,190,220,.2); color:rgba(200,190,220,.6); }
.glass-card .smart-badge { color:rgba(200,190,220,.4); }
/* 计时态 */
.glass-timer { background: linear-gradient(160deg, #1a1628, #201a32); color:#e0d8f0; text-align:center; }
.glass-timer .ring { position:relative; width:150px; height:150px; margin:0 auto 12px; }
.glass-timer .ring svg { transform:rotate(-90deg); }
.glass-timer .time { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:36px; font-weight:700; letter-spacing:2px; }
.glass-timer .task { font-size:13px; opacity:.7; margin-bottom:10px; }
.glass-timer .bubbles { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
.glass-timer .bub { padding:6px 14px; border-radius:16px; font-size:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:rgba(200,190,220,.6); }
.glass-timer .bub.done { background:rgba(100,200,130,.1); border-color:rgba(100,200,130,.2); color:rgba(130,210,160,.8); text-decoration:line-through; }
.glass-timer .btns { display:flex; gap:14px; justify-content:center; }
.glass-timer .btn-r { width:38px; height:38px; border-radius:50%; border:none; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.06); color:#c8c0e0; }
.glass-timer .btn-r.done { background:rgba(100,180,130,.15); color:#90d0a0; }
.glass-timer .btn-label { font-size:9px; opacity:.4; margin-top:3px; }

/* ====== B: 暖系猫 ====== */
.cat-card { background: linear-gradient(160deg, #1e1e2e 0%, #181825 50%, #11111b 100%); color:#cdd6f4; }
.cat-card .task-item { background:#313244; }
.cat-card .task-item .play { background:#45475a; color:#cdd6f4; }
.cat-card .task-item .play.done-play { background:#a6e3a1; color:#1e1e2e; }
.cat-card .stats-tab { color:#585b70; border:1px solid #313244; }
.cat-card .stats-tab.on { background:#45475a; color:#cdd6f4; border-color:#585b70; }
.cat-card .btn-free { border:1.5px dashed #cba6f7; color:#cba6f7; }
.cat-card .smart-badge { color:#f5c2e7; }
.cat-timer { background: linear-gradient(160deg, #1e1e2e, #181825); color:#cdd6f4; text-align:center; }
.cat-timer .ring { position:relative; width:150px; height:150px; margin:0 auto 12px; }
.cat-timer .ring svg { transform:rotate(-90deg); }
.cat-timer .time { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:40px; font-weight:700; color:#f5c2e7; }
.cat-timer .task { font-size:13px; color:#a6adc8; margin-bottom:10px; }
.cat-timer .bubbles { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
.cat-timer .bub { padding:6px 14px; border-radius:16px; font-size:12px; background:#313244; color:#bac2de; }
.cat-timer .bub.done { background:#a6e3a1; color:#1e1e2e; text-decoration:line-through; }
.cat-timer .btns { display:flex; gap:14px; justify-content:center; }
.cat-timer .btn-r { width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; font-size:17px; display:flex; align-items:center; justify-content:center; }
.cat-timer .btn-r.rest { background:#45475a; color:#cdd6f4; }
.cat-timer .btn-r.done { background:#a6e3a1; color:#1e1e2e; }
.cat-timer .btn-label { font-size:9px; color:#585b70; margin-top:3px; }

/* ====== C: 全屏极简 ====== */
.zen-card { background:#000; color:#fff; }
.zen-card .section-title { color:#555; }
.zen-card .task-item { border-bottom:1px solid #1a1a1a; }
.zen-card .task-item .play { background:transparent; border:1px solid #333; color:#888; }
.zen-card .task-item .play.done-play { background:#fff; color:#000; border-color:#fff; }
.zen-card .stats-tab { color:#444; border:1px solid #1a1a1a; }
.zen-card .stats-tab.on { background:#fff; color:#000; border-color:#fff; }
.zen-card .btn-free { border:1.5px solid #333; color:#888; }
.zen-timer { background:#000; color:#fff; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:280px; }
.zen-timer .time { font-size:68px; font-weight:200; letter-spacing:5px; }
.zen-timer .task { font-size:13px; color:#666; margin:8px 0 18px; }
.zen-timer .bubbles { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
.zen-timer .bub { font-size:13px; color:#555; }
.zen-timer .bub.done { color:#fff; text-decoration:line-through; }
.zen-timer .btns { display:flex; gap:18px; }
.zen-timer .btn-r { width:46px; height:46px; border-radius:50%; border:1px solid #333; background:transparent; color:#888; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.zen-timer .btn-r.done { border-color:#fff; color:#fff; }
.zen-timer .btn-label { font-size:9px; color:#555; margin-top:4px; }
</style>
</head>
<body>

<h2>🎯 凝神 Tab · 空闲态</h2>
<div class="wrap">

<!-- A: 玻璃 空闲 -->
<div class="card glass-card">
  <div style="text-align:center;"><span class="btn-free">🧘 Let's 专注</span> <span class="smart-badge" style="margin-left:8px;">🧠</span></div>
  <div class="section-title">待凝神</div>
  <div class="task-item"><span class="play">▶</span><span class="name">写月度报告</span><span class="meta">3个子任务 · 60min</span></div>
  <div class="task-item"><span class="play">▶</span><span class="name">整理邮件</span><span class="meta">30min</span></div>
  <div class="task-item"><span class="play done-play">✓</span><span class="name">整理大纲</span><span class="meta">已完成</span></div>
  <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;opacity:.6;">📊</span><span style="font-size:11px;opacity:.4;">近7天 4.8h</span></div>
  <div class="stats-tabs"><span class="stats-tab on">热力图</span><span class="stats-tab">趋势</span><span class="stats-tab">时段</span></div>
  <div style="display:flex;gap:2px;margin-top:4px;">
    <div style="display:flex;flex-direction:column;gap:2px;"><span style="font-size:8px;opacity:.3;">一</span><span style="width:14px;height:10px;background:rgba(255,255,255,.08);border-radius:2px;"></span><span style="width:14px;height:10px;background:rgba(200,180,240,.2);border-radius:2px;"></span><span style="width:14px;height:10px;background:rgba(200,180,240,.1);border-radius:2px;"></span><span style="width:14px;height:10px;background:rgba(255,255,255,.04);border-radius:2px;"></span></div>
    <div style="display:flex;flex-direction:column;gap:2px;"><span style="font-size:8px;opacity:.3;">二</span><span style="width:14px;height:10px;background:rgba(200,180,240,.3);border-radius:2px;"></span><span style="width:14px;height:10px;background:rgba(200,180,240,.2);border-radius:2px;"></span><span style="width:14px;height:10px;background:rgba(200,180,240,.4);border-radius:2px;"></span><span style="width:14px;height:10px;background:rgba(200,180,240,.1);border-radius:2px;"></span></div>
    <span style="font-size:10px;opacity:.3;margin-left:4px;align-self:flex-end;">...</span>
  </div>
</div>

<!-- B: 暖系猫 空闲 -->
<div class="card cat-card">
  <div style="text-align:center;"><span class="btn-free">🧘 Let's 专注</span> <span class="smart-badge" style="margin-left:8px;">🧠</span></div>
  <div class="section-title">待凝神</div>
  <div class="task-item"><span class="play">▶</span><span class="name">写月度报告</span><span class="meta">3个子任务 · 60min</span></div>
  <div class="task-item"><span class="play">▶</span><span class="name">整理邮件</span><span class="meta">30min</span></div>
  <div class="task-item"><span class="play done-play">✓</span><span class="name">整理大纲</span><span class="meta">已完成</span></div>
  <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;opacity:.6;">📊</span><span style="font-size:11px;opacity:.4;">近7天 4.8h</span></div>
  <div class="stats-tabs"><span class="stats-tab on">热力图</span><span class="stats-tab">趋势</span><span class="stats-tab">时段</span></div>
  <div style="display:flex;gap:2px;margin-top:4px;">
    <div style="display:flex;flex-direction:column;gap:2px;"><span style="font-size:8px;color:#585b70;">一</span><span style="width:14px;height:10px;background:#313244;border-radius:2px;"></span><span style="width:14px;height:10px;background:#cba6f7;border-radius:2px;opacity:.6;"></span><span style="width:14px;height:10px;background:#cba6f7;border-radius:2px;opacity:.3;"></span><span style="width:14px;height:10px;background:#313244;border-radius:2px;"></span></div>
    <div style="display:flex;flex-direction:column;gap:2px;"><span style="font-size:8px;color:#585b70;">二</span><span style="width:14px;height:10px;background:#cba6f7;border-radius:2px;opacity:.8;"></span><span style="width:14px;height:10px;background:#cba6f7;border-radius:2px;opacity:.5;"></span><span style="width:14px;height:10px;background:#cba6f7;border-radius:2px;"></span><span style="width:14px;height:10px;background:#cba6f7;border-radius:2px;opacity:.3;"></span></div>
    <span style="font-size:10px;color:#585b70;margin-left:4px;align-self:flex-end;">...</span>
  </div>
</div>

</div>

<h2>🎯 凝神 Tab · 计时中</h2>
<div class="wrap">

<div class="card glass-timer">
  <div class="ring"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="65" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="5"/><circle cx="75" cy="75" r="65" fill="none" stroke="#9880d0" stroke-width="5" stroke-dasharray="408" stroke-dashoffset="110" opacity=".8" stroke-linecap="round"/></svg><div class="time">18:32</div></div>
  <div class="task">写月度报告</div>
  <div class="bubbles"><span class="bub done">整理大纲</span><span class="bub">填写数据</span><span class="bub">校对</span></div>
  <div class="btns"><div><button class="btn-r">⏸</button><div class="btn-label">休息</div></div><div><button class="btn-r done">✓</button><div class="btn-label">完成</div></div></div>
</div>

<div class="card cat-timer">
  <div class="ring"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="65" fill="none" stroke="#313244" stroke-width="7"/><circle cx="75" cy="75" r="65" fill="none" stroke="#cba6f7" stroke-width="7" stroke-dasharray="408" stroke-dashoffset="110" stroke-linecap="round"/></svg><div class="time">18:32</div></div>
  <div class="task">写月度报告</div>
  <div class="bubbles"><span class="bub done">整理大纲</span><span class="bub">填写数据</span><span class="bub">校对</span></div>
  <div class="btns"><div><button class="btn-r rest">⏸</button><div class="btn-label">休息</div></div><div><button class="btn-r done">✓</button><div class="btn-label">完成</div></div></div>
</div>

<div class="card zen-timer">
  <div class="time">18:32</div>
  <div class="task">写月度报告</div>
  <div class="bubbles"><span class="bub done">整理大纲</span><span class="bub">·</span><span class="bub">填写数据</span><span class="bub">·</span><span class="bub">校对</span></div>
  <div class="btns"><div><button class="btn-r">⏸</button><div class="btn-label">休息</div></div><div><button class="btn-r done">✓</button><div class="btn-label">完成</div></div></div>
</div>

</div>

</body>
</html>
