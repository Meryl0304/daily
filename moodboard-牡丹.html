<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>牡丹图标 · 许愿瓶</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f8f6f3; max-width: 420px; margin: 0 auto;
  min-height: 100vh; padding: 24px; padding-bottom: 80px;
}

h1 { font-size: 17px; color: #3a3226; margin-bottom: 4px; }
.sub { font-size: 12px; color: #999; margin-bottom: 24px; }

.card {
  background: #fff; border-radius: 16px; padding: 20px;
  margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.card h2 { font-size: 14px; color: #888; margin-bottom: 14px; font-weight: 400; }

/* 牡丹 SVG 容器 */
.peony-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.peony-box { text-align: center; }
.peony-box .label { font-size: 10px; color: #999; margin-top: 4px; }

/* 许愿瓶预览 */
.jar-preview {
  display: flex; align-items: center; gap: 16px;
}
.jar-icon {
  width: 56px; height: 72px; position: relative; flex-shrink: 0;
}
.jar-glass {
  width: 48px; height: 60px; border: 2.5px solid #c0bfb8;
  border-radius: 8px 8px 16px 16px; position: absolute;
  bottom: 4px; left: 4px; background: rgba(255,255,255,.4);
}
.jar-neck {
  width: 28px; height: 10px; border: 2.5px solid #c0bfb8;
  border-radius: 4px 4px 0 0; position: absolute;
  top: 0; left: 14px; border-bottom: none;
}
.jar-cork {
  width: 20px; height: 8px; background: #d4a87c;
  border-radius: 3px; position: absolute; top: 0; left: 18px;
}
.stars-in-jar {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 8px; letter-spacing: 2px; width: 36px; text-align: center;
  line-height: 1.4;
}
.jar-count {
  font-size: 11px; color: #b0a090; text-align: center; margin-top: 2px;
}

/* 星星弹出 */
.star-popup {
  background: #fff; border-radius: 14px; padding: 20px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.1); max-width: 260px; margin: 0 auto;
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
}
.star-popup .flower { font-size: 40px; margin-bottom: 8px; }
.star-popup .text { font-size: 15px; color: #3a3226; margin-bottom: 4px; }
.star-popup .date { font-size: 12px; color: #999; margin-bottom: 12px; }
.star-popup .actions { display: flex; gap: 8px; justify-content: center; }
.star-popup button {
  border: none; border-radius: 20px; padding: 8px 18px; font-size: 12px; cursor: pointer;
}
.btn-close { background: #eee; color: #666; }
.btn-remove { background: none; color: #c0392b; font-size: 11px; }

/* 添加按钮 */
.add-star-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: #f5f0e8; border: 1.5px dashed #c0bfb8; border-radius: 20px;
  padding: 6px 14px; font-size: 12px; color: #8a8070; cursor: pointer;
  margin-top: 10px;
}

@keyframes popIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }

/* 夜间 */
body.night { background: #1a1d23; }
body.night .card { background: #252830; }
body.night .card h2 { color: #7a7060; }
body.night h1 { color: #e0d8cc; }
body.night .jar-glass { border-color: #5a5850; background: rgba(255,255,255,.06); }
body.night .jar-neck { border-color: #5a5850; }
body.night .star-popup { background: #252830; }
body.night .star-popup .text { color: #e0d8cc; }
body.night .btn-close { background: #3a3d42; color: #999; }
body.night .add-star-btn { background: #2a2d32; border-color: #5a5850; color: #8a8070; }

.toggle-btn {
  position: fixed; bottom: 20px; right: 20px;
  background: #2c3e50; color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px; font-size: 20px;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2); z-index: 50;
}
</style>
</head>
<body>

<h1><svg width="22" height="22" viewBox="0 0 48 48" style="vertical-align:-4px; margin-right:4px;"><ellipse cx="24" cy="14" rx="10" ry="12" fill="#e8a0b0" opacity="0.7"/><ellipse cx="34" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(72 24 24)"/><ellipse cx="34" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(144 24 24)"/><ellipse cx="14" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(216 24 24)"/><ellipse cx="14" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(288 24 24)"/><ellipse cx="24" cy="16" rx="6" ry="7" fill="#f0c0cc" opacity="0.9"/><ellipse cx="31" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(72 24 24)"/><ellipse cx="31" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(144 24 24)"/><ellipse cx="17" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(216 24 24)"/><ellipse cx="17" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(288 24 24)"/><circle cx="24" cy="24" r="6" fill="#f5d060"/><circle cx="22" cy="23" r="1.5" fill="#e0a020" opacity="0.6"/><circle cx="26" cy="23" r="1.5" fill="#e0a020" opacity="0.6"/><circle cx="24" cy="26" r="1.5" fill="#e0a020" opacity="0.6"/></svg> 牡丹图标 · 许愿瓶</h1>
<p class="sub">风格 A · 简约五瓣</p>

<!-- ====== 牡丹变体 ====== -->
<div class="card">
  <h2>图标尺寸 · 四种风格</h2>
  <div class="peony-row">

    <!-- A: 简约五瓣 -->
    <div class="peony-box">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 外层大瓣 -->
        <ellipse cx="24" cy="14" rx="10" ry="12" fill="#e8a0b0" opacity="0.7"/>
        <ellipse cx="34" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(72 24 24)"/>
        <ellipse cx="34" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(144 24 24)"/>
        <ellipse cx="14" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(216 24 24)"/>
        <ellipse cx="14" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(288 24 24)"/>
        <!-- 内层小瓣 -->
        <ellipse cx="24" cy="16" rx="6" ry="7" fill="#f0c0cc" opacity="0.9"/>
        <ellipse cx="31" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(72 24 24)"/>
        <ellipse cx="31" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(144 24 24)"/>
        <ellipse cx="17" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(216 24 24)"/>
        <ellipse cx="17" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(288 24 24)"/>
        <!-- 花心 -->
        <circle cx="24" cy="24" r="6" fill="#f5d060"/>
        <circle cx="22" cy="23" r="1.5" fill="#e0a020" opacity="0.6"/>
        <circle cx="26" cy="23" r="1.5" fill="#e0a020" opacity="0.6"/>
        <circle cx="24" cy="26" r="1.5" fill="#e0a020" opacity="0.6"/>
      </svg>
      <div class="label">A · 简约五瓣</div>
    </div>

    <!-- B: 层叠圆润 -->
    <div class="peony-box">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 最外层 -->
        <circle cx="24" cy="24" r="22" fill="#e8a8b8" opacity="0.5"/>
        <!-- 层次1：波浪花瓣 -->
        <path d="M24 8 C18 12, 10 30, 24 40 C38 30, 30 12, 24 8Z" fill="#e898a8" opacity="0.6"/>
        <path d="M8 24 C12 18, 30 10, 40 24 C30 38, 12 30, 8 24Z" fill="#e898a8" opacity="0.6"/>
        <!-- 层次2 -->
        <path d="M24 14 C20 18, 16 28, 24 36 C32 28, 28 18, 24 14Z" fill="#f0b8c8" opacity="0.7"/>
        <path d="M14 24 C18 20, 28 16, 36 24 C28 32, 18 28, 14 24Z" fill="#f0b8c8" opacity="0.7"/>
        <!-- 层次3 -->
        <circle cx="24" cy="24" r="8" fill="#f8d0dc" opacity="0.8"/>
        <!-- 花心 -->
        <circle cx="24" cy="24" r="4" fill="#f8e080"/>
        <circle cx="23" cy="23" r="1" fill="#e8c040" opacity="0.7"/>
        <circle cx="25.5" cy="24" r="1" fill="#e8c040" opacity="0.7"/>
        <circle cx="24" cy="25.5" r="1" fill="#e8c040" opacity="0.7"/>
        <!-- 绿叶 -->
        <ellipse cx="36" cy="38" rx="6" ry="4" fill="#a0c8a0" opacity="0.5" transform="rotate(-30 36 38)"/>
      </svg>
      <div class="label">B · 层叠圆润</div>
    </div>

    <!-- C: 线描风 -->
    <div class="peony-box">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 线描牡丹，细线条 -->
        <g fill="none" stroke="#d4a0a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <!-- 外层花瓣弧线 -->
          <path d="M24 10 C18 12, 8 22, 12 32 C14 36, 20 38, 24 36"/>
          <path d="M24 10 C30 12, 40 22, 36 32 C34 36, 28 38, 24 36"/>
          <path d="M12 32 C8 28, 12 18, 18 14"/>
          <path d="M36 32 C40 28, 36 18, 30 14"/>
          <!-- 内层 -->
          <path d="M24 16 C20 18, 14 24, 16 30 C18 32, 22 34, 24 32"/>
          <path d="M24 16 C28 18, 34 24, 32 30 C30 32, 26 34, 24 32"/>
          <path d="M16 30 C14 28, 16 20, 20 18"/>
          <path d="M32 30 C34 28, 32 20, 28 18"/>
          <!-- 最内层 -->
          <circle cx="24" cy="26" r="5"/>
          <!-- 花心点 -->
          <circle cx="23" cy="25" r="1.5" fill="#e8c040" stroke="none"/>
          <circle cx="25" cy="25" r="1.5" fill="#e8c040" stroke="none"/>
          <circle cx="24" cy="27" r="1.5" fill="#e8c040" stroke="none"/>
        </g>
      </svg>
      <div class="label">C · 线描淡雅</div>
    </div>

    <!-- D: 浓色重瓣 -->
    <div class="peony-box">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 深色外瓣 -->
        <ellipse cx="24" cy="10" rx="14" ry="16" fill="#c84060" opacity="0.5"/>
        <ellipse cx="38" cy="24" rx="14" ry="16" fill="#c84060" opacity="0.5" transform="rotate(90 24 24)"/>
        <!-- 中瓣 -->
        <ellipse cx="24" cy="14" rx="10" ry="12" fill="#d86080" opacity="0.6"/>
        <ellipse cx="36" cy="24" rx="10" ry="12" fill="#d86080" opacity="0.6" transform="rotate(90 24 24)"/>
        <!-- 内瓣 -->
        <ellipse cx="24" cy="18" rx="7" ry="8" fill="#e890a8" opacity="0.7"/>
        <ellipse cx="32" cy="24" rx="7" ry="8" fill="#e890a8" opacity="0.7" transform="rotate(90 24 24)"/>
        <ellipse cx="24" cy="24" rx="5" ry="5" fill="#f0b0c0" opacity="0.8"/>
        <!-- 花心 -->
        <circle cx="24" cy="24" r="3" fill="#f8d060"/>
      </svg>
      <div class="label">D · 浓色重瓣</div>
    </div>
  </div>
</div>

<!-- ====== 许愿瓶完整预览 ====== -->
<div class="card">
  <h2>最终效果 · 标题就是花</h2>
  <div class="jar-preview">

    <!-- 32px 瓶子 + 牡丹 -->
    <div class="jar-icon">
      <div class="jar-neck"></div>
      <div class="jar-cork"></div>
      <div class="jar-glass">
        <div class="stars-in-jar" id="starsJar">⭐</div>
      </div>
    </div>

    <div style="flex:1; min-width:0;">
      <div style="font-size: 15px; font-weight: 600; color: #3a3226; margin-bottom: 4px;">
        <svg width="28" height="28" viewBox="0 0 48 48" style="vertical-align:-6px;">
          <ellipse cx="24" cy="14" rx="10" ry="12" fill="#e8a0b0" opacity="0.7"/>
          <ellipse cx="34" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(72 24 24)"/>
          <ellipse cx="34" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(144 24 24)"/>
          <ellipse cx="14" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(216 24 24)"/>
          <ellipse cx="14" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(288 24 24)"/>
          <ellipse cx="24" cy="16" rx="6" ry="7" fill="#f0c0cc" opacity="0.9"/>
          <ellipse cx="31" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(72 24 24)"/>
          <ellipse cx="31" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(144 24 24)"/>
          <ellipse cx="17" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(216 24 24)"/>
          <ellipse cx="17" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(288 24 24)"/>
          <circle cx="24" cy="24" r="6" fill="#f5d060"/>
        </svg>
      </div>
      <div style="font-size: 12px; color: #b0a090;">近 30 天攒了 <strong style="color:#d4a0a0;">12</strong> 颗幸运星</div>
      <button class="add-star-btn" style="margin-top:8px;">+ 存一颗</button>
    </div>
  </div>

  <!-- 点击星星弹出 -->
  <div class="star-popup" style="margin-top:16px;">
    <div class="flower">
      <svg width="36" height="36" viewBox="0 0 48 48">
        <ellipse cx="24" cy="14" rx="10" ry="12" fill="#e8a0b0" opacity="0.7"/>
        <ellipse cx="34" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(72 24 24)"/>
        <ellipse cx="34" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(144 24 24)"/>
        <ellipse cx="14" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(216 24 24)"/>
        <ellipse cx="14" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(288 24 24)"/>
        <ellipse cx="24" cy="16" rx="6" ry="7" fill="#f0c0cc" opacity="0.9"/>
        <ellipse cx="31" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(72 24 24)"/>
        <ellipse cx="31" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(144 24 24)"/>
        <ellipse cx="17" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(216 24 24)"/>
        <ellipse cx="17" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(288 24 24)"/>
        <circle cx="24" cy="24" r="6" fill="#f5d060"/>
      </svg>
    </div>
    <div class="text">快递提前到了</div>
    <div class="date">6月12日 星期二</div>
    <div class="actions">
      <button class="btn-close">关闭</button>
      <button class="btn-remove">摘掉这颗星</button>
    </div>
  </div>
</div>

<p style="text-align:center;font-size:11px;color:#bbb;margin-top:20px;">
  牡丹 SVG 图标 · 四种风格可独立使用
</p>

<button class="toggle-btn" onclick="document.body.classList.toggle('night');this.textContent=document.body.classList.contains('night')?'☀️':'🌙';">🌙</button>
</body>
</html>
