<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>花开 · 深海星空</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #1a1a3e 0%, #2d2d5e 30%, #3a3a6a 100%);
  min-height: 100vh; display:flex; align-items:center; justify-content:center;
}
.card {
  width: 340px; min-height: 440px; border-radius: 20px; padding: 32px 24px;
  text-align: center; color: #e8e0f0;
  background: linear-gradient(180deg, #1e1a3a 0%, #2a2545 50%, #332d50 100%);
  box-shadow: 0 4px 24px rgba(0,0,0,.3), 0 0 60px rgba(120,100,180,.1);
  position: relative; overflow: hidden;
}
/* 背景星点 */
.card::before {
  content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
  background:
    radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 80% 10%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.3), transparent),
    radial-gradient(1.5px 1.5px at 70% 70%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 10% 50%, rgba(255,200,230,.3), transparent),
    radial-gradient(1px 1px at 85% 60%, rgba(200,180,255,.3), transparent),
    radial-gradient(1.5px 1.5px at 45% 30%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
}

.title { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #e8d8f8; }
.title svg { vertical-align: -3px; margin-right: 4px; }

.bottle-wrap {
  position: relative; display: inline-block; margin: 24px 0;
  animation: float 3.5s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform: translateY(0) rotate(-0.5deg); } 50% { transform: translateY(-10px) rotate(0.5deg); } }

.bottle-glow {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 120px; height: 160px;
  background: radial-gradient(ellipse, rgba(180,200,255,.2) 0%, rgba(200,180,240,.1) 40%, transparent 70%);
  border-radius: 50%; filter: blur(24px);
}

/* 散布星星 */
.spark {
  position: absolute; font-size: 10px; animation: twinkle 1.8s ease-in-out infinite;
}
.spark:nth-child(odd) { animation-delay: .6s; }
.spark:nth-child(3n) { animation-delay: 1.2s; }
@keyframes twinkle { 0%,100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.2); } }

.count { font-size: 14px; opacity: .7; margin-top: 4px; color: #c8c0e0; }

/* 按钮组 */
.btn-row { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn-toss {
  background: rgba(180,200,240,.12); border: 1px solid rgba(180,200,240,.25);
  color: #c8d8f8; border-radius: 22px; padding: 10px 26px; font-size: 14px;
  cursor: pointer; transition: .2s; font-weight: 500;
}
.btn-toss:hover { background: rgba(180,200,240,.2); border-color: rgba(180,200,240,.4); }
.btn-toss.primary { background: rgba(160,140,220,.2); border-color: rgba(180,160,240,.35); }

/* 小文案候选 */
.options { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.opt-chip {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.5); border-radius: 14px; padding: 4px 12px; font-size: 11px;
  cursor: pointer; transition: .15s;
}
.opt-chip:hover { background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); }
.opt-chip.pick { background: rgba(180,200,240,.15); border-color: rgba(180,200,240,.3); color: #c8d8f8; }

/* 夜间模式切换 */
.dark-toggle { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:50%; width:44px; height:44px; font-size:20px; cursor:pointer; z-index:50; }
</style>
</head>
<body>

<div class="card">
  <div class="title">
    <svg width="22" height="22" viewBox="0 0 48 48"><ellipse cx="24" cy="14" rx="10" ry="12" fill="#e8a0b0" opacity="0.7"/><ellipse cx="34" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(72 24 24)"/><ellipse cx="34" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(144 24 24)"/><ellipse cx="14" cy="30" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(216 24 24)"/><ellipse cx="14" cy="18" rx="10" ry="12" fill="#e8a0b0" opacity="0.7" transform="rotate(288 24 24)"/><ellipse cx="24" cy="16" rx="6" ry="7" fill="#f0c0cc" opacity="0.9"/><ellipse cx="31" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(72 24 24)"/><ellipse cx="31" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(144 24 24)"/><ellipse cx="17" cy="28" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(216 24 24)"/><ellipse cx="17" cy="20" rx="6" ry="7" fill="#f0c0cc" opacity="0.9" transform="rotate(288 24 24)"/><circle cx="24" cy="24" r="6" fill="#f5d060"/></svg>
    花开
  </div>

  <div class="bottle-wrap">
    <div class="bottle-glow"></div>
    <svg width="100" height="160" viewBox="0 0 100 160">
      <defs>
        <linearGradient id="freshGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(200,210,240,0.18)"/>
          <stop offset="30%" stop-color="rgba(220,225,250,0.05)"/>
          <stop offset="70%" stop-color="rgba(200,210,240,0.03)"/>
          <stop offset="100%" stop-color="rgba(200,210,240,0.12)"/>
        </linearGradient>
      </defs>
      <path d="M18,55 Q18,38 28,32 L38,32 L38,12 Q38,6 44,6 L56,6 Q62,6 62,12 L62,32 L72,32 Q82,38 82,55 L82,138 Q82,152 72,154 L28,154 Q18,152 18,138 Z" fill="url(#freshGrad)" stroke="rgba(200,210,240,0.35)" stroke-width="2"/>
      <rect x="42" y="6" width="16" height="8" rx="3" fill="#706090" opacity="0.5"/>
      <text x="35" y="72" font-size="12" fill="#f0e0a0">⭐</text>
      <text x="48" y="65" font-size="14" fill="#f5e8b0">⭐</text>
      <text x="38" y="88" font-size="11" fill="#f0e0a0">⭐</text>
      <text x="50" y="82" font-size="13" fill="#f5e8b0">⭐</text>
      <text x="40" y="100" font-size="12" fill="#f0e0a0">⭐</text>
      <text x="53" y="95" font-size="10" fill="#f5e8b0">⭐</text>
      <text x="37" y="112" font-size="12" fill="#f0e0a0">⭐</text>
      <text x="46" y="108" font-size="13" fill="#f5e8b0">⭐</text>
      <text x="42" y="122" font-size="11" fill="#f0e0a0">⭐</text>
    </svg>
    <span class="spark" style="top:5px;left:-8px;">✦</span>
    <span class="spark" style="top:25px;right:-5px;">✦</span>
    <span class="spark" style="top:50px;left:-12px;">✧</span>
    <span class="spark" style="bottom:20px;right:-10px;">✦</span>
    <span class="spark" style="top:70px;right:-14px;">✧</span>
  </div>

  <div class="count">近 30 天攒了 12 颗幸运星</div>

  <div class="btn-row">
    <button class="btn-toss primary">投一颗星星</button>
  </div>

  <div class="options">
    <span class="opt-chip pick">投一颗星星</span>
    <span class="opt-chip">掷入瓶中</span>
    <span class="opt-chip">存下此刻</span>
    <span class="opt-chip">种一颗星</span>
    <span class="opt-chip">许个愿望</span>
  </div>
</div>

<button class="dark-toggle" onclick="document.querySelector('.card').style.background=document.querySelector('.card').style.background?'':'linear-gradient(180deg, #f8f4ff 0%, #e8e0f8 50%, #f0e8f8 100%)';this.textContent=this.textContent==='🌙'?'☀️':'🌙'">🌙</button>

</body>
</html>
