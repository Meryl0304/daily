<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>小满</title>
<style>
/* ====== CSS 变量：日间主题 ====== */
:root {
  --bg: #e8e5e0; --card: #f0ede8; --text: #4a4540; --muted: #9a9488;
  --accent: #9080a8; --done: #80a090; --warn: #c09088; --border: #d8d4cc;
  --shadow: 0 1px 3px rgba(0,0,0,.06); --radius: 12px;
  --btn: #9080a8; --btn-text: #fff;
  --incomplete-bg: #ece8e0; --incomplete-text: #b0a898;
  --sprint-ring: #9080a8; --sprint-ring-warn: #c0a060; --sprint-ring-urgent: #c08080;
  --overdue-bg: #f5ecec; --overdue-text: #b06050;
}
.theme-forest {
  --bg: #e2e6e0; --card: #eaeeea; --text: #3e4840; --muted: #8a9488;
  --accent: #689870; --done: #689870; --warn: #b88078; --border: #c8d0c4;
  --btn: #689870; --btn-text: #fff;
  --incomplete-bg: #e6eae4; --incomplete-text: #a0a898;
  --sprint-ring: #689870; --sprint-ring-warn: #b89840; --sprint-ring-urgent: #b87070;
  --overdue-bg: #f0e8e4; --overdue-text: #a06048;
}
.theme-warm {
  --bg: #e8e0d4; --card: #f0e8dc; --text: #484030; --muted: #a09880;
  --accent: #b88060; --done: #80a888; --warn: #b87868; --border: #d8ccbc;
  --btn: #b88060; --btn-text: #fff;
  --incomplete-bg: #ece4d8; --incomplete-text: #b0a080;
  --sprint-ring: #b88060; --sprint-ring-warn: #c89830; --sprint-ring-urgent: #c06858;
  --overdue-bg: #f0e4d8; --overdue-text: #a05038;
}
.theme-minimal {
  --bg: #e0e0e0; --card: #eaeaea; --text: #3a3a3a; --muted: #909090;
  --accent: #707070; --done: #709070; --warn: #a07070; --border: #c8c8c8;
  --btn: #5a5a5a; --btn-text: #fff;
  --incomplete-bg: #e4e4e4; --incomplete-text: #a0a0a0;
  --sprint-ring: #707070; --sprint-ring-warn: #a09050; --sprint-ring-urgent: #a06060;
  --overdue-bg: #e8e0e0; --overdue-text: #905048;
}

/* ====== 夜间模式 ====== */
body.night {
  background: #1c1a24;

body.night header { background: var(--card); }
body.night .bottom-nav { background: var(--card); }

  --bg: #1c1a24; --card: #242230; --text: #e8e4f0; --muted: #8a8498;
  --border: #343040; --shadow: 0 1px 3px rgba(0,0,0,.25);
  --incomplete-bg: #282430; --incomplete-text: #7a7480;
  --overdue-bg: #282020; --overdue-text: #c88080;
}

body.night.theme-forest { --bg:#181c18; --card:#202420; --text:#d0d8d0; --muted:#788878; --border:#303830; --incomplete-bg:#222822; --incomplete-text:#687868; --overdue-bg:#281818; }
body.night.theme-warm { --bg:#1c1814; --card:#24201c; --text:#d8d0c0; --muted:#888070; --border:#343028; --incomplete-bg:#242018; --incomplete-text:#787060; --overdue-bg:#281c18; }
body.night.theme-minimal { --bg:#181818; --card:#202020; --text:#c8c8c8; --muted:#787878; --border:#303030; --incomplete-bg:#202020; --incomplete-text:#686868; --overdue-bg:#281818; }

/* ====== 基础 + 响应式 ====== */
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 500px; margin: 0 auto;
  min-height: 100vh; padding-bottom: 72px;
}
/* 平板/桌面 */
@media (min-width: 768px) {
  body { max-width: 720px; }
  .desktop-row { display: flex; gap: 14px; }
  .desktop-row > * { flex: 1; min-width: 0; }
  .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
}
/* 触摸目标 */
@media (pointer: coarse) {
  .task-circle, .delete-btn, .btn, .btn-sm, .header-btn, .nav-item { min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; }
}
@media (hover: none) {
  .task-item:hover { background: inherit; }
  .cal-cell:hover { background: inherit; }
}

header {
  background: var(--card); padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:10;
  gap: 4px;
}
header h1 { font-size: 17px; font-weight: 600; white-space: nowrap; }
header .header-icons { display: flex; align-items: center; gap: 2px; }
.header-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 3px 5px; color: var(--text); border-radius: 6px; position: relative; }
.header-btn.accent { color: var(--accent); }
.points-mini { font-size: 12px; background: var(--accent); color: #fff; border-radius: 10px; padding: 2px 8px; font-weight: 600; white-space: nowrap; }
.notif-badge { position: absolute; top: -2px; right: -2px; width: 15px; height: 15px; background: var(--warn); color: #fff; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; }
.notif-badge.hidden { display: none; }

/* ====== 页面 ====== */
.page { display: none; padding: 12px 16px; }
.page.active { display: block; }
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  backdrop-filter: blur(8px);
}
.card h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }

/* ====== 任务条目 ====== */
.task-item {
  display: flex; align-items: center; padding: 6px 10px;
  border-radius: 8px; gap: 8px; cursor: pointer; transition: .15s;
  margin-bottom: 2px; font-size: 14px;
}
.task-item.pending { background: var(--incomplete-bg); color: var(--incomplete-text); }
.task-item.done-item { color: var(--text); font-weight: 500; }
.task-item.overdue { background: var(--overdue-bg); color: var(--overdue-text); }
.task-circle {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: .15s;
}
.task-circle.done { background: var(--done); border-color: var(--done); color: #fff; }
.task-circle.deadline { background: var(--warn); border-color: var(--warn); color: #fff; }
.task-circle.overdue-c { color: var(--warn); font-size: 15px; border-color: var(--warn); }
.task-name { flex:1; }
.substep-item { font-size: 13px; padding: 4px 10px 4px 32px; }
.substep-item::before { content: '— '; color: var(--muted); }
.substep-item.ss-collapsed { display: none; }
.delete-btn { background: none; border: none; color: var(--muted); font-size: 17px; cursor: pointer; padding: 0 3px; }

/* ====== 按钮 ====== */
.btn { background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-weight: 500; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-outline { background: transparent; color: var(--btn); border: 1px solid var(--btn); }
.btn-block { display: block; width: 100%; text-align: center; }
.btn-danger { background: var(--warn); }
.muted { color: var(--muted); font-size: 12px; }

/* ====== 表单 ====== */
.add-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.add-row input, .add-row select { flex:1; border: 1px solid var(--border); border-radius: 8px; padding: 7px 8px; font-size: 13px; background: var(--bg); color: var(--text); min-width: 0; }
.form-group { margin-bottom: 8px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
.form-group input, .form-group select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 13px; background: var(--bg); color: var(--text); }
.form-row { display: flex; gap: 6px; }
.form-row > * { flex:1; }
input::placeholder { color: var(--muted); font-size: 12px; }

/* ====== 喝水 ====== */
.water-bar-wrap { display: flex; align-items: center; gap: 8px; }
.water-bar-bg { flex:1; height: 14px; background: var(--border); border-radius: 7px; overflow: hidden; }
.water-bar-fg { height: 100%; background: var(--accent); border-radius: 7px; transition: width .3s; }
.water-bar-fg.full { background: var(--accent); opacity: .8; }
.water-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .15s; line-height: 1; }
.water-btn:hover { border-color: #5b9bd5; color: #5b9bd5; }
.water-count { font-size: 12px; color: var(--muted); min-width: 28px; text-align: center; }
.water-full-hint { font-size: 12px; color: var(--accent); margin-left: 4px; animation: fadeInOut 3s ease forwards; }
@keyframes fadeInOut { 0% { opacity: 0; } 15% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
.water-dot { display: inline-block; width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: .15s; margin: 0 2px; }
.water-dot.filled { background: var(--accent); border-color: var(--accent); }
.water-dot.readonly { cursor: default; }

/* ====== 极简模块 ====== */
.focus-block { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.focus-date { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.focus-top { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
/* 星标任务方框 */
.star-box { background: var(--incomplete-bg); color: var(--warn); 
  display: block; width: 100%; text-align: left; cursor: pointer;
  padding: 10px 14px; border-radius: 12px; font-size: 15px; font-weight: 500;
  border: none; margin-bottom: 6px; transition: .2s;
  background: rgba(200,50,50,0.08); color: #c0392b;
}
.star-box.done { background: rgba(39,174,96,0.08); color: var(--done); }
.theme-forest .star-box { background: var(--incomplete-bg); color: var(--warn);  background: rgba(200,50,50,0.08); color: #c0392b; }
.theme-forest .star-box.done { background: rgba(39,174,96,0.08); color: var(--done); }
.theme-warm .star-box { background: var(--incomplete-bg); color: var(--warn);  background: rgba(200,50,50,0.08); color: #c0392b; }
.theme-warm .star-box.done { background: rgba(39,174,96,0.08); color: var(--done); }
.theme-minimal .star-box { background: var(--incomplete-bg); color: var(--warn);  background: rgba(200,50,50,0.08); color: #c0392b; }
.theme-minimal .star-box.done { background: rgba(39,174,96,0.08); color: var(--done); }
body.night .star-box { background: var(--incomplete-bg); color: var(--warn);  background: rgba(220,80,80,0.12); color: #e07070; }
body.night .star-box.done { background: rgba(39,174,96,0.12); color: #6aaa7a; }
.focus-streaks { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.focus-streak-chip { display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
.streak-btn { font-size: 12px; padding: 0 6px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); }
.streak-btn.done { background: var(--done); color: #fff; border-color: var(--done); }
.focus-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.focus-pill { font-size: 12px; padding: 4px 10px; border-radius: 14px; background: var(--incomplete-bg); color: var(--incomplete-text); cursor: pointer; border: none; }
.focus-pill.done { background: var(--done); color: #fff; }

/* ====== 过往日期 ====== */
.day-past-header .past-tag { font-size: 11px; color: var(--muted); margin-left: 6px; }
.past-circle { cursor: default !important; }

/* ====== 逾期 ====== */
.overdue-area { margin-bottom: 10px; }
.overdue-item { background: var(--overdue-bg); color: var(--overdue-text); font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; border: 1px solid var(--warn); }

/* ====== 点阵 / 进度条 ====== */
.dot-matrix { display: flex; gap: 3px; flex-wrap: wrap; margin: 4px 0; }
.dot-matrix .dm-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border); }
.dot-matrix .dm-dot.filled { background: var(--done); }
.streak-bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.streak-bar-fg { height: 100%; background: var(--done); border-radius: 4px; transition: width .5s; }

/* ====== 凝神 ====== */


.focus-start-ring { display:inline-block; width:80px; height:80px; border-radius:50%; background:rgba(80,60,100,.06); border:2px solid rgba(100,80,130,.25); box-shadow:0 0 16px rgba(100,80,130,.06); cursor:pointer; position:relative; animation: focusPulse 3s ease-in-out infinite; box-shadow:0 0 20px rgba(200,160,220,.1); }
.focus-start-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:30px; }
@keyframes focusPulse { 0%,100% { box-shadow:0 0 20px rgba(200,160,220,.1); } 50% { box-shadow:0 0 35px rgba(200,160,220,.25); } }
.focus-free-btn { background:rgba(200,160,220,.12); border:2px solid rgba(200,160,220,.2); color:#d8b8f0; border-radius:24px; padding:10px 24px; font-size:14px; cursor:pointer; box-shadow:0 2px 8px rgba(200,160,220,.08); }
.focus-ring-wrap { position:relative; width:180px; height:180px; margin:0 auto 16px; }
.focus-ring-cat { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:22px; z-index:2; animation: catBounce 2s ease-in-out infinite; }
@keyframes catBounce { 0%,100% { transform:translateX(-50%) translateY(0); } 50% { transform:translateX(-50%) translateY(-4px); } }
.focus-ring-wrap svg { transform:rotate(-90deg); }
.focus-ring-bg { fill:none; stroke:rgba(160,120,200,.1); stroke-width:8; }
.focus-ring-fg { fill:none; stroke:#c8a0e0; stroke-width:8; stroke-linecap:round; filter:drop-shadow(0 0 6px rgba(200,160,220,.25)); transition:stroke-dashoffset .3s,stroke .5s; }
.focus-ring-center { position:absolute; top:50%;left:50%;transform:translate(-50%,-50%); text-align:center; }
.focus-time { font-size:40px; font-weight:700; letter-spacing:1px; color:#4a3a5a; }
.focus-task-name { font-size:13px; color:#6a5a78; margin-top:4px; }
.focus-bubbles { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
.focus-bubble { padding:8px 16px; border-radius:20px; font-size:13px; cursor:pointer; background:var(--card); color:var(--text); border:1px solid var(--border); }
.focus-bubble.done { background:rgba(39,174,96,.06); color:var(--done); border-color:rgba(39,174,96,.15); text-decoration:line-through; }
.focus-bubble.current { border-color:var(--accent); color:var(--accent); }
.focus-btn-row { display:flex; gap:20px; justify-content:center; }
.focus-btn-group { text-align:center; }
.focus-btn { width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; font-size:18px; background:var(--bg); color:var(--text); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(0,0,0,.3); }
.focus-btn-done { background:var(--accent); color:#fff; }
.focus-btn-stop { background:transparent; border:2px solid var(--warn); color:var(--warn); opacity:.7; }
.focus-btn-label { font-size:10px; color:var(--muted); margin-top:3px; }
.focus-stats-tabs { display:flex; gap:6px; margin-bottom:8px; }
.fstab { padding:5px 14px; border-radius:16px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:var(--bg); color:var(--muted); }
.fstab.on { background:var(--accent); color:#fff; border-color:var(--accent); }

body.night .focus-start-ring { background:rgba(160,120,200,.15); border-color:rgba(200,160,220,.3); box-shadow:0 0 20px rgba(200,160,220,.1); animation: focusPulse 3s ease-in-out infinite; }
body.night .focus-start-ring:hover { box-shadow:0 0 40px rgba(200,160,220,.3); }
body.night .focus-time { color:#f0d0ff; }
body.night .focus-task-name { color:#b098c8; }
body.night .focus-bubble { background:rgba(120,80,160,.15); color:rgba(210,180,230,.8); border-color:rgba(160,120,200,.2); box-shadow:0 2px 4px rgba(0,0,0,.2); }
body.night .focus-bubble.done { background:rgba(140,200,160,.15); color:#b8f0d0; border-color:rgba(140,200,160,.25); }
body.night .focus-bubble.current { border-color:var(--accent); color:var(--accent); }
body.night .focus-btn { background:rgba(160,120,200,.2); color:#d0b0e8; box-shadow:0 3px 8px rgba(0,0,0,.3); }
body.night .focus-btn-done { background:var(--accent); color:#fff; }
body.night .focus-btn-stop { border-color:rgba(200,120,120,.25); color:#d8a0a0; }
body.night .focus-btn-label { color:rgba(200,170,220,.4); }
body.night .fstab { border-color:rgba(120,100,140,.2); background:rgba(80,60,100,.2); color:rgba(200,170,220,.4); }
body.night .fstab.on { background:var(--accent); color:#fff; border-color:var(--accent); }
body.night .focus-ring-bg { stroke:rgba(160,120,200,.1); }
body.night .focus-ring-fg { stroke:#c8a0e0; filter:drop-shadow(0 0 6px rgba(200,160,220,.25)); }


/* ====== 冲刺（保留旧样式过渡） ====== */
.sprint-timer { font-size: 36px; text-align: center; font-weight: 700; margin: 16px 0; color: var(--accent); }
.sprint-goal { text-align: center; font-size: 16px; color: var(--text); margin-bottom: 16px; }
.sprint-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
.sprint-ring-container { position: relative; width: 160px; height: 160px; margin: 0 auto; }
.sprint-ring-container svg { transform: rotate(-90deg); }
.sprint-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
.sprint-ring-fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .3s, stroke .5s; }

/* ====== 日历 ====== */
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cal-nav button { background: none; border: none; font-size: 17px; cursor: pointer; color: var(--text); padding: 4px 6px; }
.cal-nav span { font-weight: 600; font-size: 14px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
.cal-header { font-size: 11px; color: var(--muted); padding: 4px 0; }
.cal-cell { padding: 5px 1px; border-radius: 8px; cursor: pointer; font-size: 13px; min-height: 32px; position: relative; }
.cal-cell:hover { background: rgba(160,120,200,.08); }
.cal-cell.today { box-shadow: 0 0 6px 4px rgba(144,128,168,.45); font-weight: 700; }
.cal-cell.selected { background: var(--accent); color: #fff; font-weight: 600; }
.cal-cell.today.selected { background: var(--accent); color: #fff; box-shadow: 0 0 10px 6px rgba(144,128,168,.65); }
.cal-cell .dots { display: flex; justify-content: center; gap: 3px; margin-top: 1px; }
.cal-cell .dot { width: 4px; height: 4px; border-radius: 50%; }
.cal-cell .dot.task-done { background: var(--done); }
.cal-cell .dot.event { background: var(--accent); }
.cal-cell .dot.overdue-dot { background: var(--warn); }
.cal-cell.selected .dot.task-done, .cal-cell.selected .dot.event, .cal-cell.selected .dot.overdue-dot { background: #fff; }
.cal-cell.today .dot.task-done, .cal-cell.today .dot.event, .cal-cell.today .dot.overdue-dot { background: var(--accent); }
.cal-cell .task-count { font-size: 10px; color: var(--muted); line-height: 1; }

/* ====== 通知横幅 ====== */
.notif-area { position: fixed; top: 48px; left: 50%; transform: translateX(-50%); max-width: 500px; width: 100%; z-index: 99; }
.notif-banner { background: var(--card); border-left: 4px solid var(--accent); padding: 10px 14px; margin: 3px 14px; border-radius: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; animation: slideDown .3s ease; font-size: 13px; }
.notif-banner .msg { flex:1; }
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

/* ====== Toast ====== */
.toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--card); padding: 7px 18px; border-radius: 20px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ====== 底部导航 ====== */
.bottom-nav { position: fixed; bottom:0; left:50%; transform: translateX(-50%); max-width: 500px; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0; z-index: 10; }
@media (min-width: 768px) { .bottom-nav { max-width: 720px; } }
.nav-item { background: none; border: none; color: var(--muted); font-size: 10px; cursor: pointer; padding: 3px 0; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.nav-item .icon { font-size: 20px; }
.nav-item.cur { color: var(--accent); }

/* ====== 小卖部 ====== */
.shop-header { background: linear-gradient(135deg, #2c3e50 0%, #3d566e 100%); border-radius: 14px; padding: 18px; color: #fff; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
.shop-header-top { display: flex; align-items: center; gap: 12px; }
.shop-coin { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #f0c040, #e0a820); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.shop-pts { font-size: 28px; font-weight: 700; color: var(--text); }
.shop-pts-label { font-size: 11px; opacity: .7; }
.shop-hint { font-size: 12px; background: rgba(255,255,255,.1); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 6px; }
.shop-cat { font-size: 14px; font-weight: 700; color: var(--text); margin: 14px 0 6px; }
body.night .shop-cat { color: #e0d8cc; }
.shop-card {
  background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow);
  border-left: 3px solid var(--border); cursor: pointer; transition: .15s;
}
.shop-card.can-buy { border-left-color: var(--done); }
.shop-card.almost { border-left-color: #e0a820; }
.shop-card .shop-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; background: #fef3e0; }
.shop-card .shop-icon.big { background: #f0e8f8; }
.shop-card .shop-body { flex: 1; min-width: 0; }
.shop-card .shop-name { font-size: 14px; font-weight: 600; }
.shop-card .shop-meta { font-size: 11px; color: var(--muted); }
.shop-card .shop-cost { font-weight: 700; color: #e0a820; font-size: 13px; white-space: nowrap; }
.shop-progress { margin-top: 6px; }
.shop-progress-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.shop-progress-fg { height: 100%; border-radius: 3px; }
.shop-progress-fg.done { background: var(--done); }
.shop-progress-fg.going { background: linear-gradient(90deg, #e0a820, #f0c040); }
.shop-progress-label { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
.shop-add-row { display: flex; gap: 6px; align-items: center; }
.shop-add-row input { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; background: var(--bg); color: var(--text); }
.shop-freq { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 2px; white-space: nowrap; }
.shop-freq input { width: 42px; border: 1px solid var(--border); border-radius: 6px; padding: 4px; text-align: center; background: var(--bg); color: var(--text); font-size: 12px; }
.shop-log-toggle { font-size: 12px; color: var(--muted); cursor: pointer; }
.shop-log-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.shop-log-item .sl-date { color: var(--muted); font-size: 11px; }
.shop-log-item .sl-name { flex: 1; }
.shop-log-item .sl-cost { color: #e0a820; font-weight: 600; }
.shop-celebrate {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
  background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center;
  animation: fadeIn .3s;
}
.shop-celebrate-card {
  background: var(--card); border-radius: 20px; padding: 32px 24px; text-align: center;
  max-width: 280px; animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.shop-celebrate-card .sc-emoji { font-size: 48px; margin-bottom: 10px; }
.shop-celebrate-card .sc-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.shop-celebrate-card .sc-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* ====== 花开 ====== */
.bloom-page { text-align: center; padding: 24px 20px; }
.bloom-card { background: linear-gradient(180deg, #1e1a3a 0%, #2a2545 50%, #332d50 100%); border-radius: 20px; padding: 32px 24px; position: relative; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.3); }
.bloom-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,.5), transparent), radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.4), transparent), radial-gradient(1.5px 1.5px at 80% 10%, rgba(255,255,255,.4), transparent), radial-gradient(1px 1px at 30% 75%, rgba(255,255,255,.3), transparent), radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,.35), transparent), radial-gradient(1.5px 1.5px at 45% 30%, rgba(255,255,255,.4), transparent); pointer-events: none; }
.bloom-header { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 4px; position: relative; z-index: 1; }
.bloom-title { font-size: 20px; font-weight: 700; color: #e8d8f8; }
.bloom-stars-field { position: relative; width: 100%; min-height: 200px; margin: 16px 0; }
.bloom-stars-field .bloom-jar-star { position: absolute; cursor: pointer; animation: bloomTwinkle 2s ease-in-out infinite; }
.bloom-stars-field .bloom-jar-star:hover { transform: scale(1.4) !important; z-index: 10; }
@keyframes bloomTwinkle { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
.bloom-count-text { font-size: 14px; color: rgba(200,192,224,.7); margin-top: 4px; position: relative; z-index: 1; }
.bloom-toss-btn { background: rgba(180,200,240,.12); border: 1px solid rgba(180,200,240,.25); color: #c8d8f8; border-radius: 22px; padding: 10px 26px; font-size: 14px; cursor: pointer; font-weight: 500; position: relative; z-index: 1; transition: .2s; }
.bloom-toss-btn:hover { background: rgba(180,200,240,.2); }
body.night .bloom-card { background: linear-gradient(180deg, #1e1a3a 0%, #2a2545 50%, #332d50 100%); }
body.night .bloom-count-text { color: rgba(200,192,224,.7); }

/* ====== 拾语 ====== */
.lang-tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
.lang-tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: .15s; }
.lang-tab.en.active { border-color: #c4a8a0; background: #fdf6f4; color: #a08070; }
.lang-tab.jp.active { border-color: #c0b0d0; background: #f8f4fb; color: #7a6a90; }
.lang-tab.fr.active { border-color: #a0b8d0; background: #f4f7fb; color: #6a7a90; }
body.night .lang-tab { background: #2a2d32; border-color: #3a3d42; }
body.night .lang-tab.en.active { background: #2a2522; border-color: #6a5a4a; color: #b09080; }
body.night .lang-tab.jp.active { background: #252228; border-color: #5a4a6a; color: #a090b0; }
body.night .lang-tab.fr.active { background: #222528; border-color: #4a5a6a; color: #90a0b0; }
.lang-bubbles { min-height: 160px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; padding: 8px 0; }
.lang-bubble { padding: 10px 18px; border-radius: 22px; font-size: 14px; font-weight: 500; cursor: pointer; transition: .2s; animation: langFloat 3s ease-in-out infinite; }
.lang-bubble:nth-child(odd) { animation-delay: .4s; }
.lang-bubble:nth-child(3n) { animation-delay: .8s; }
.lang-bubble.en { background: #fdf6f2; color: #8a6a5a; border: 1.5px solid #e8d0c0; }
.lang-bubble.jp { background: #f8f4fb; color: #7a6a90; border: 1.5px solid #d8c8e8; }
.lang-bubble.fr { background: #f4f7fb; color: #6a7a90; border: 1.5px solid #c0d0e8; }
body.night .lang-bubble.en { background: #2a2522; color: #c0a090; border-color: #4a4038; }
body.night .lang-bubble.jp { background: #252228; color: #b0a0c0; border-color: #3a3040; }
body.night .lang-bubble.fr { background: #222528; color: #a0b0c0; border-color: #303840; }
.lang-bubble:hover { transform: scale(1.06); }
@keyframes langFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.lang-vocab { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 8px; }
.lang-vocab-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
.lang-vocab-item .lv-tag { font-size: 9px; padding: 2px 6px; border-radius: 8px; color: #fff; flex-shrink: 0; }
.lang-vocab-item .lv-tag.en { background: #a08070; }
.lang-vocab-item .lv-tag.jp { background: #7a6a90; }
.lang-vocab-item .lv-tag.fr { background: #6a7a90; }
.lang-vocab-item .lv-word { font-weight: 600; flex: 1; }
.lang-vocab-item .lv-del { cursor: pointer; color: var(--muted); }
.lang-add-row { display: flex; gap: 4px; margin-top: 8px; }
.lang-add-row select, .lang-add-row input { border: 1px solid var(--border); border-radius: 8px; padding: 6px; font-size: 12px; background: var(--bg); color: var(--text); min-width: 0; }
.lang-add-row .btn { flex-shrink: 0; }
.lang-flashcard { background: var(--card); border-radius: 16px; padding: 28px 20px; text-align: center; box-shadow: var(--shadow); cursor: pointer; min-height: 80px; display: flex; align-items: center; justify-content: center; }
.flash-front { font-size: 20px; font-weight: 600; }
.flash-back { font-size: 15px; color: var(--muted); }

/* ====== 今日事件 ====== */
.event-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; font-size: 14px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px; margin-bottom: 2px; }
.event-row:last-child { border-bottom: 1px solid var(--border); }
.event-row.confirmed { background: rgba(39,174,96,0.08); border-bottom-color: transparent; }
.event-time { font-size: 13px; color: var(--muted); min-width: 44px; }
.event-name { flex: 1; }
.event-empty { font-size: 13px; color: var(--muted); padding: 4px 0; }
.event-more { font-size: 12px; color: var(--accent); cursor: pointer; padding-top: 3px; }
.event-popup { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; animation: fadeIn .3s; }
.event-popup-card { background: var(--card); border-radius: 16px; padding: 24px 20px; text-align: center; max-width: 300px; width: 90%; animation: popIn .4s cubic-bezier(.34,1.56,.64,1); }
.event-popup-card h3 { font-size: 16px; margin-bottom: 8px; }
.event-popup-card .ep-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; color: var(--muted); justify-content: center; }
.event-popup-card .ep-row select { border: 1px solid var(--border); border-radius: 8px; padding: 4px 6px; font-size: 12px; background: var(--bg); color: var(--text); }
.event-popup-card .ep-status { font-size: 13px; margin-bottom: 12px; }
.event-popup-card .ep-actions { display: flex; gap: 8px; justify-content: center; }

/* ====== PWA 安装 ====== */
.install-banner { background: var(--accent); color: #fff; padding: 6px 14px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
.install-banner button { background: #fff; color: var(--accent); border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
.install-banner.hidden { display: none; }
</style>
</head>
<body>

<div id="installBanner" class="install-banner hidden">
  <span>添加到桌面，随时打开</span>
  <button onclick="promptInstall()">安装</button>
</div>

<header>
  <h1>小满</h1>
  <div class="header-icons">
    <button class="header-btn" id="backBtn" onclick="goBack()" title="返回" style="font-size:18px;visibility:hidden;">←</button>
    <button class="header-btn" onclick="switchTab('notifications')" title="日常提醒" style="position:relative;font-size:18px;">🔔<span class="notif-badge hidden" id="notifBadge">0</span></button>
    <button class="header-btn" onclick="toggleNightMode()" title="夜间模式" id="nightToggle" style="font-size:18px;">🌙</button>
    <button class="header-btn" onclick="switchTab('shop')" title="小卖部" style="font-size:18px;">🏪</button>
    <button class="header-btn" onclick="switchTab('settings')" title="设置" style="font-size:18px;">⚙</button>
    <span class="points-mini" id="headerPoints">0</span>
  </div>
</header>

<div id="notifArea" class="notif-area"></div>
<div id="toast" class="toast"></div>

<!-- ====== ① 日历首页 ====== -->
<div class="page active" id="page-calendar">
  <div class="overdue-area" id="overdueArea"></div>
  <div class="focus-block">
    <div class="focus-date" id="focusDate"></div>
    <div class="focus-top" id="focusTopTask">—</div>
    <div class="focus-streaks" id="focusStreaks"></div>
    <div class="focus-pills" id="focusNutrition"></div>
    <div style="margin-top:4px;" id="focusWater"></div>
    <div style="margin-top:6px;" id="focusManifest"></div>
  </div>

    <div class="cal-nav">
      <button onclick="changeCalMonth(-1)">←</button>
      <span id="calMonthLabel"></span>
      <button onclick="changeCalMonth(1)">→</button>
      <button class="btn btn-sm" onclick="document.getElementById('calMonthPicker').showPicker()" style="font-size:13px;padding:2px 6px;" title="选择月份">📅</button>
      <input type="month" id="calMonthPicker" style="display:none;" onchange="var v=this.value.split('-');calYear=parseInt(v[0]);calMonth=parseInt(v[1]);renderCalendar()">
      <button class="btn btn-sm" onclick="goCalToday()" style="font-size:11px;padding:3px 8px;">今天</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="calDayBtn" style="text-align:center;margin-top:8px;display:none;">
      <button class="btn btn-sm" onclick="switchTab('day')" style="display:block;margin:0 auto;">📋 详情</button>
    </div>
  </div>
  <div class="card" id="eventsCard">
    <h3 style="margin:0 0 6px 0;">📅 事件</h3>
    <div id="eventsList"></div>
  </div>
</div>

<!-- ====== ② 日详情页 ====== -->
<div class="page" id="page-day">
  <div class="card" id="dayDetailCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:4px;">
      <button class="btn btn-sm btn-outline" onclick="switchTab('calendar')">←</button>
      <button class="btn btn-sm btn-outline" onclick="navDay(-1)" style="font-size:10px;padding:4px 6px;">◀</button>
      <strong id="dayDetailTitle"></strong>
      <button class="btn btn-sm" onclick="document.getElementById('dayDatePicker').showPicker()" style="font-size:13px;padding:2px 6px;" title="选择日期">📅</button>
      <input type="date" id="dayDatePicker" style="display:none;" onchange="calSelected=this.value;renderDayDetail();renderCalendar()">
      <button class="btn btn-sm btn-outline" onclick="navDay(1)" style="font-size:10px;padding:4px 6px;">▶</button>
      <button class="btn btn-sm" id="dayEditToggleBtn" onclick="toggleDayEdit()">✏️</button>
    </div>
    <div class="section-label" style="font-size:16px;font-weight:700;color:var(--accent);">今日事项</div>
    <div id="dayDetailTasks" style="max-height:420px;overflow-y:auto;"></div>
    <div class="section-label" style="font-size:14px;font-weight:600;color:var(--text);margin-top:12px;">📅 日程</div>
    <div id="dayDetailEvents"></div>
    <div class="section-label" style="margin-top:8px;color:var(--accent);" id="dayDetailPoints"></div>
  </div>
</div>

<!-- ====== ③ 冲刺 ====== -->
<!-- ====== ③ 凝神 ====== -->
<div class="page" id="page-sprint">
  <div id="focusIdle">
    <div class="card" id="focusTaskList"></div>
    <div style="text-align:center;margin:16px 0;">
      <div class="focus-start-ring" onclick="startFocus(null)">
        <span class="focus-start-icon">🧘</span>
      </div>
      <div style="font-size:14px;color:#d8b8f0;margin-top:6px;font-weight:500;">Let's 专注</div>
      <span id="focusSmartBadge" style="font-size:12px;cursor:pointer;opacity:.5;margin-top:4px;display:none;" title="智能已激活" onclick="toast('🧠 基于 '+sprintLog.length+' 次凝神记录')">🧠 智能已就绪</span>
    </div>
    <div class="card" id="focusStats">

        <span class="fstab on" onclick="switchFocusStat('heat')">热力图</span>
        <span class="fstab" onclick="switchFocusStat('trend')">趋势</span>

      </div>

    </div>

    <div class="card" style="text-align:center;">
      <div class="focus-ring-wrap">

        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle class="focus-ring-bg" cx="90" cy="90" r="78"/>
          <circle class="focus-ring-fg" id="focusRing" cx="90" cy="90" r="78" stroke-dasharray="490" stroke-dashoffset="0"/>
        </svg>
        <div class="focus-ring-center">
          <div class="focus-time" id="focusTimer">--:--</div>

    </div>

</div>

<!-- ====== ④ 小卖部 ====== -->

</div>
<div id="celebrateLayer"></div>

<!-- ====== ⑤ 日常提醒 ====== -->
<div class="page" id="page-notifications">
  <div class="card">

    <div id="reminderList"></div>
  </div>
  <div class="card" id="reminderAddCard">
    <h3>添加</h3>
    <div class="form-row">
      <select id="remType" onchange="remTypeChange()" style="flex:0.5;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;background:var(--bg);color:var(--text);">

      </select>

<script>
/* ==================================================================================
   日常管理 PWA — 完整脚本
   P0: 数据结构铺底（新字段 + 旧数据迁移 + 农历 + 响应式基础）
   本轮仅改数据层和基础设施，所有 UI 逻辑保持原有行为不变
   ================================================================================== */

// ====== 工具函数 ======
var STORAGE = localStorage;
var TODAY = (function(){ var d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
var WEEKDAYS = ['日','一','二','三','四','五','六'];

function load(key, def) { try { var v = STORAGE.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
function save(key, val) { STORAGE.setItem(key, JSON.stringify(val)); }

// ====== 农历算法（1900-2100） ======
var LUNAR_INFO = {
  /* 1900-2100 年农历数据，每个年份4字节编码月大小和闰月信息 */
  /* 以下为常用年份段的简化编码，完整覆盖 2000-2050 */
  years: {
    /* 格式: 0xYYYY 其中 Y=闰月(0=无) Y=月大小(12/13位二进制，1=30天 0=29天) */
    /* 为了简洁实用，此处使用查表法存储关键年 */
  },
  /* 农历年名称 */
  tianGan: ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],
  diZhi:   ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],
  shengXiao: ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'],
  /* 月名 */
  monthName: ['正','二','三','四','五','六','七','八','九','十','冬','腊'],
  dayName: ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
            '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
            '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十']
};

/* 核心农历数据：每年16位编码 (闰月+大小月)
   2000-2050 年覆盖，格式见注释 */
var LUNAR_YEAR_DATA = [
  0x04bd8, /* 2000 */ 0x04ae0, 0x0a570, 0x054d5, 0x0d260, 0x0d950, /* 2005 */
  0x16554, 0x056a0, 0x09ad0, 0x055d2, 0x04ae0, 0x0a5b6, /* 2010 */
  0x0a4d0, 0x0d250, 0x1d255, 0x0b540, 0x0d6a0, 0x0ada2, /* 2015 */
  0x095b0, 0x14977, 0x04970, 0x0a4b0, 0x0b4b5, 0x06a50, /* 2020 */
  0x06d40, 0x1ab54, 0x02b60, 0x09570, 0x052f2, 0x04970, /* 2025 */
  0x06566, 0x0d4a0, 0x0ea50, 0x16a95, 0x05ad0, 0x02b60, /* 2030 */
  0x186e3, 0x092e0, 0x1c8d7, 0x0c950, 0x0d4a0, 0x1d8a6, /* 2035 */
  0x0b550, 0x056a0, 0x1a5b4, 0x025d0, 0x092d0, 0x0d2b2, /* 2040 */
  0x0a950, 0x0b557, 0x06ca0, 0x0b550, 0x15355, 0x04da0, /* 2045 */
  0x0a5b0, 0x14573, 0x052b0, 0x0a9a8, 0x0e950, 0x06aa0  /* 2050 */
];

function getLunarYearInfo(year) {
  /* 返回 { yearBase: 农历年基(干支), leapMonth: 闰月(0=无), monthDays: [12/13个月各几天] } */
  if (year < 2000 || year > 2050) return null;
  var idx = year - 2000;
  var code = LUNAR_YEAR_DATA[idx];
  if (!code && idx < LUNAR_YEAR_DATA.length) code = LUNAR_YEAR_DATA[idx];
  if (!code) return null;
  var leapMonth = (code >> 12) & 0xf; /* 闰月（0=无闰月，否则为闰月编号1-12） */
  var monthDays = [];
  for (var i = 0; i < 12 + (leapMonth ? 1 : 0); i++) {
    /* 从高位到低位读取每个月的大小 */
    var bitPos = 15 - i; /* 因为我们有16位但只用低12位存大小月 */
    if (i < leapMonth || !leapMonth) {
      monthDays.push((code >> (15 - i)) & 1 ? 30 : 29);
    }
  }
  /* 简化版本：只返回关键信息 */
  var days = [];
  var rawDays = code & 0xfff; /* 低12位存大小月 */
  var totalMonths = 12 + (leapMonth ? 1 : 0);
  for (var j = 0; j < 12; j++) {
    days.push((rawDays >> (11 - j)) & 1 ? 30 : 29);
  }
  if (leapMonth) {
    /* 闰月插在对应位置之后，大小在第13位 */
    var leapSize = (code >> 16) & 1 ? 30 : 29;
    days.splice(leapMonth, 0, leapSize);
  }
  return {
    yearBase: (year + 2697) % 60, /* 黄帝纪元推算 */
    leapMonth: leapMonth,
    monthDays: days
  };
}

function solarToLunar(dateStr) {
  /* 公历日期字符串 'YYYY-MM-DD' → { year, month, day, isLeap, yearName, monthName, dayName } */
  var parts = dateStr.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
  if (y < 2000 || y > 2050) return null;

  /* 计算当年春节在公历中的日期 */
  var info = getLunarYearInfo(y);
  if (!info) return null;

  /* 简便算法：用春节偏移做基准 */
  /* 春节 ≈ 1月21日-2月20日之间，用预计算数据 */
  var SPRING_BASE = [
    /* 2000-2050 每年农历正月初一的公历日期 (MMDD) */
    '0205','0124','0212','0201','0122','0209','0129','0218','0207','0126', /* 2000-2009 */
    '0214','0203','0123','0210','0131','0219','0208','0128','0216','0205', /* 2010-2019 */
    '0125','0212','0201','0122','0210','0129','0217','0206','0126','0213', /* 2020-2029 */
    '0203','0123','0211','0131','0219','0208','0128','0216','0204','0124', /* 2030-2039 */
    '0212','0201','0122','0210','0130','0217','0206','0126','0214','0203', /* 2040-2049 */
    '0123'  /* 2050 */
  ];
  var idx = y - 2000;
  var springStr = y + '-' + SPRING_BASE[idx].substring(0,2) + '-' + SPRING_BASE[idx].substring(2,4);
  var springDate = new Date(springStr);
  var targetDate = new Date(dateStr);
  var diffDays = Math.floor((targetDate - springDate) / 86400000);

  if (diffDays < 0) {
    /* 在春节之前，属于上一个农历年 */
    var prevInfo = getLunarYearInfo(y - 1);
    if (!prevInfo) return null;
    var prevSpringIdx = (y - 1) - 2000;
    var prevSpringStr = (y - 1) + '-' + SPRING_BASE[prevSpringIdx].substring(0,2) + '-' + SPRING_BASE[prevSpringIdx].substring(2,4);
    var prevSpringDate = new Date(prevSpringStr);
    var prevDiffDays = Math.floor((targetDate - prevSpringDate) / 86400000);
    return buildLunarResult(y - 1, prevDiffDays, prevInfo);
  } else {
    return buildLunarResult(y, diffDays, info);
  }
}

function buildLunarResult(year, dayOffset, info) {
  var ly = year;
  var remaining = dayOffset;
  var lm = 0, ld = 0, isLeap = false;
  for (var i = 0; i < info.monthDays.length; i++) {
    if (remaining < info.monthDays[i]) {
      lm = (i < info.leapMonth || info.leapMonth === 0) ? i + 1 : i;
      ld = remaining + 1;
      /* 判断是否是闰月：如果 leapMonth > 0 且当前索引 >= leapMonth 且前面已过 leapMonth 个普通月 */
      if (info.leapMonth > 0 && i === info.leapMonth) { isLeap = true; lm = info.leapMonth; }
      else if (info.leapMonth > 0 && i > info.leapMonth) { lm = i; }
      else { lm = i + 1; }
      break;
    }
    remaining -= info.monthDays[i];
    if (i === info.monthDays.length - 1) { ld = remaining + 1; lm = info.monthDays.length; }
  }

  /* 重新准确计算月份（闰月逻辑） */
  var mIndex = 0, rd = dayOffset;
  var actualMonth = 0;
  var actualIsLeap = false;
  for (var k = 0; k < info.monthDays.length; k++) {
    if (rd < info.monthDays[k]) { actualMonth = k + 1; ld = rd + 1; break; }
    rd -= info.monthDays[k];
    if (k === info.monthDays.length - 1) { actualMonth = k + 1; ld = rd + 1; }
  }
  /* 闰月标记 */
  if (info.leapMonth > 0 && actualMonth > info.leapMonth) {
    actualMonth -= 1; /* 闰月后的月份编号减1 */
  }
  if (info.leapMonth > 0 && actualMonth === info.leapMonth + 1 && rd < (info.monthDays[info.leapMonth] || 0)) {
    /* 需要判断是否在闰月内 */
    var beforeLeap = 0;
    for (var bl = 0; bl < info.leapMonth; bl++) beforeLeap += info.monthDays[bl];
    if (dayOffset >= beforeLeap && dayOffset < beforeLeap + info.monthDays[info.leapMonth]) {
      actualIsLeap = true;
      actualMonth = info.leapMonth;
      ld = dayOffset - beforeLeap + 1;
    }
  }

  var yearName = LUNAR_INFO.tianGan[info.yearBase % 10] + LUNAR_INFO.diZhi[info.yearBase % 12];
  var monthName = (actualIsLeap ? '闰' : '') + LUNAR_INFO.monthName[(actualMonth - 1) % 12];
  /* 简化月名处理 */
  if (actualMonth > 12) actualMonth = actualMonth % 12;
  if (actualMonth === 0) actualMonth = 12;
  var mn = LUNAR_INFO.monthName[actualMonth - 1];
  monthName = (actualIsLeap ? '闰' : '') + mn;
  var dayName = LUNAR_INFO.dayName[ld - 1] || String(ld);

  return {
    year: ly,
    month: actualMonth,
    day: ld,
    isLeap: actualIsLeap,
    yearName: yearName + '年',
    shengXiao: LUNAR_INFO.shengXiao[info.yearBase % 12],
    monthName: monthName,
    dayName: ld >= 1 && ld <= 30 ? LUNAR_INFO.dayName[ld - 1] : String(ld),
    yearBase: info.yearBase
  };
}

function getLunarDisplay(dateStr) {
  var lunar = solarToLunar(dateStr);
  if (!lunar) return '';
  return lunar.yearName + ' · ' + lunar.shengXiao + '年 · ' + lunar.monthName + '月' + lunar.dayName;
}

// ====== P0 数据迁移 ======
(function runMigrations(){
  var migrated = load('_migration_v2', false);
  if (migrated) return;

  /* 1. 清理营养品数据 */
  STORAGE.removeItem('nutritions');
  STORAGE.removeItem('nutrition_records');
  STORAGE.removeItem('nutrition_skips');

  /* 2. 清理 settings 中废弃字段 */
  var s = load('settings', {});
  if (s.points_rules) {
    if (s.points_rules.nutrition !== undefined) delete s.points_rules.nutrition;
    if (s.points_rules.weekly_task !== undefined) delete s.points_rules.weekly_task;
    if (s.points_rules.sprint_done === undefined) s.points_rules.sprint_done = 5;
    save('settings', s);
  }

  /* 3. 更新极简模块配置 */
  var fc = load('focus_mode_config', {});
  if (fc.items && fc.items.indexOf('nutrition') !== -1) {
    fc.items = fc.items.filter(function(x){ return x !== 'nutrition'; });
    save('focus_mode_config', fc);
  }

  /* 4. SprintLog 格式升级 */
  var oldLog = load('sprint_log', []);
  if (oldLog.length > 0 && typeof oldLog[0] === 'object' && !('task_id' in oldLog[0])) {
    var newLog = oldLog.map(function(entry){
      return {
        date: entry.date || '',
        start_time: entry.time || '',
        duration_min: 0,
        task_id: null,
        task_category: null,
        actual_minutes: 0,
        completed: true,
        notes: ''
      };
    });
    save('sprint_log', newLog);
  }

  /* 5. Event 提醒加 confirmed 字段 */
  var rems = load('reminders', []);
  var remChanged = false;
  rems.forEach(function(r){
    if (r.type === 'event' && r.confirmed === undefined) { r.confirmed = false; remChanged = true; }
    if (r.type === 'event' && r.repeat_interval === undefined) { r.repeat_interval = 5; remChanged = true; }
    if (r.type === 'event' && r.repeat_count === undefined) { r.repeat_count = 5; remChanged = true; }
  });
  if (remChanged) save('reminders', rems);

  /* 6. 新数据默认值 */
  if (!STORAGE.getItem('luckyStars')) save('luckyStars', []);
  if (!STORAGE.getItem('daily_capacity')) save('daily_capacity', { default_minutes: 360, rest_days: [] });

  save('_migration_v2', true);
})();

// ====== 全局设置（P0 新默认值） ======
var settings = load('settings', {
  theme: '默认',
  points_rules: { daily_task: 10, water: 1, sprint_done: 5 },
  focus_min: 25  /* 凝神默认时长（分钟） */
});

function applyTheme(name) {
  document.body.className = '';
  var map = {'默认':'','森林':'theme-forest','暖橙':'theme-warm','极简':'theme-minimal'};
  if (map[name]) document.body.classList.add(map[name]);
  if (nightMode.enabled) document.body.classList.add('night');
}
function toggleNightMode() { nightMode.enabled = !nightMode.enabled; save('night_mode',nightMode); if (nightMode.enabled) document.body.classList.add('night'); else document.body.classList.remove('night'); updateNightToggle(); }
function updateNightToggle() { document.getElementById('nightToggle').textContent = nightMode.enabled ? '☀️' : '🌙'; }
function checkNightAuto() {
  var now = new Date(), cur = now.getHours()*60+now.getMinutes();
  var start = parseInt(nightMode.auto_start.split(':')[0])*60+parseInt(nightMode.auto_start.split(':')[1]);
  var end = parseInt(nightMode.auto_end.split(':')[0])*60+parseInt(nightMode.auto_end.split(':')[1]);
  var should = start > end ? (cur >= start || cur < end) : (cur >= start && cur < end);
  if (should !== nightMode.enabled) { nightMode.enabled = should; save('night_mode',nightMode); if (nightMode.enabled) document.body.classList.add('night'); else document.body.classList.remove('night'); updateNightToggle(); }
}

function switchTab(tab) {
  if (currentTab === 'day' && editMode && tab !== 'day') {
    if (!confirm('退出编辑模式？')) return;
    editMode = false;
  }
  if (tab !== currentTab) { pageStack.push(currentTab); if (pageStack.length > 20) pageStack.shift(); }
  currentTab = tab;
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  var page = document.getElementById('page-'+tab); if (page) page.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('cur'); if (n.dataset.tab===tab) n.classList.add('cur'); });
  if (tab === 'calendar') renderCalendar();
  else if (tab === 'sprint') renderFocus();
  else if (tab === 'shop') renderShop();
  else if (tab === 'bloom') renderBloom();
  else if (tab === 'lang') renderLang();
  else if (tab === 'notifications') renderRemindersPage();
  else if (tab === 'settings') renderSettings();
  else if (tab === 'day') renderDayDetail();
  window.scrollTo(0,0);
  updateBackBtn();
}
function goBack() {
  var prev = pageStack.pop();
  if (!prev) return;
  currentTab = prev;
  switchTab(prev);

function avgDailyPoints() {
  var keys = Object.keys(pointRecords); if (!keys.length) return 0;
  var total = 0; keys.forEach(function(k){ total += pointRecords[k]; });
  var sorted = keys.sort(), first = sorted[0], last = sorted[sorted.length-1];
  var days = Math.max(1, Math.ceil((new Date(last)-new Date(first))/86400000) + 1);

/* ====== 逾期任务区 ====== */
function renderOverdueArea() {
  var overdue = [];
  tasks.forEach(function(t){
    if (!t.max_days || !t.created_date) return;
    var created = new Date(t.created_date);
    var deadline = new Date(created); deadline.setDate(deadline.getDate() + t.max_days);
    var dk = deadline.getFullYear()+'-'+String(deadline.getMonth()+1).padStart(2,'0')+'-'+String(deadline.getDate()).padStart(2,'0');
    if (dk > TODAY) return;
    var done = (taskRecords[dk]||{}).done||{};
    if (done[String(t.id)]) return;
    var doneLater = false;
    for (var di = new Date(dk); di.toISOString().slice(0,10) <= TODAY; di.setDate(di.getDate()+1)) {
      var diKey = di.getFullYear()+'-'+String(di.getMonth()+1).padStart(2,'0')+'-'+String(di.getDate()).padStart(2,'0');
      if (((taskRecords[diKey]||{}).done||{})[String(t.id)]) { doneLater = true; break; }
    }
    if (doneLater) return;
    var overdueDays = Math.floor((new Date(TODAY) - deadline) / 86400000);
    var label = overdueDays === 0 ? '今天截止' : ('逾期 '+overdueDays+' 天');
    overdue.push({ task:t, label:label, deadline:dk });
  });
  if (!overdue.length) { document.getElementById('overdueArea').innerHTML = ''; return; }
  overdue.sort(function(a,b){ return a.deadline.localeCompare(b.deadline); });
  var html = '';
  overdue.forEach(function(o){
    html += '<div class="overdue-item">⚠ '+esc(o.task.name)+' <span style="font-size:11px;">'+o.label+' 截止 '+o.deadline+'</span>';
    html += '<button class="btn btn-sm" style="margin-left:auto;flex-shrink:0;" onclick="event.stopPropagation();showScheduleDialog('+o.task.id+')">接入日程</button></div>';
  });
  document.getElementById('overdueArea').innerHTML = html;
}

function showScheduleDialog(taskId) {
  var t = tasks.find(function(x){ return x.id===taskId; }); if (!t) return;
  var items = [];
  if (t.substeps && t.substeps.length) {
    t.substeps.forEach(function(ss){ items.push({ name:ss.name, min: ss.est_minutes||ss.max_days*60||30, orig: ss }); });
  } else {
    var est = t.est_minutes || 60;
    items.push({ name: t.name, min: est, orig: null });
  }
  /* 按原始顺序分配 */
  var cap = dailyCapacity.default_minutes || 360;
  var suggestSplit = !t.substeps || !t.substeps.length;
  var tooBig = suggestSplit && (t.est_minutes||60) > cap * 0.2;
  var restDays = dailyCapacity.rest_days || [];
  var days = [];
  var d = new Date(TODAY);
  for (var i = 0; i < 10; i++) {
    var ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var dow = d.getDay();
    var isRest = restDays.indexOf(String(dow)) !== -1;
    var usedMinutes = 0;
    var dayTasks = tasks.filter(function(x){ return taskActiveOn(x, ds); });
    dayTasks.forEach(function(x){ usedMinutes += x.est_minutes || 0; });
    days.push({ ds:ds, dow:dow, isRest:isRest, remaining:Math.max(0, cap-usedMinutes), assigned:[], used:usedMinutes });
    d.setDate(d.getDate()+1);
  }
  var assigned = [];
  var unassigned = false;
  items.forEach(function(item){
    var placed = false;
    for (var k = 0; k < days.length; k++) {
      if (days[k].isRest) continue;
      if (days[k].remaining >= item.min) { days[k].assigned.push(item); days[k].remaining -= item.min; placed = true; break; }
    }
    if (!placed) { unassigned = true; }
  });
  /* 构建弹窗 */
  var html = '<div class="event-popup" onclick="if(event.target===this)this.remove()"><div class="shop-celebrate-card" style="max-width:340px;text-align:left;">';
  html += '<h3 style="text-align:center;margin-bottom:12px;">将「'+esc(t.name)+'」接入日程？</h3>';
  if (tooBig) html += '<p style="text-align:center;font-size:12px;color:var(--warn);margin-bottom:8px;">💡 这个任务比较大（超过每天容量的20%），建议拆成子步骤再分配</p>';
  var anyAssigned = false;
  days.forEach(function(day){
    if (!day.assigned.length) return;
    anyAssigned = true;
    html += '<div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:8px;font-size:13px;">';
    html += '<strong>'+day.ds+'</strong> <span class="muted">可用 '+Math.floor(day.remaining/60)+'h'+(day.remaining%60)+'min</span>';
    if (day.isRest) html += ' <span style="color:var(--warn);">休息日</span>';
    day.assigned.forEach(function(it){ html += '<div style="padding-left:8px;">✅ '+esc(it.name)+' '+it.min+'min</div>'; });
    html += '</div>';
  });
  if (!anyAssigned) html += '<p class="muted" style="text-align:center;">接下来 10 天都排满啦 😅 试试减少任务或扩大容量</p>';
  html += '<div style="text-align:center;margin-top:12px;"><button class="btn btn-sm btn-outline" onclick="this.parentElement.parentElement.parentElement.remove()">取消</button> ';
  html += '<button class="btn btn-sm" onclick="confirmSchedule('+taskId+');this.parentElement.parentElement.parentElement.remove()">确认分配</button></div>';
  html += '</div></div>';
  var layer = document.createElement('div'); layer.innerHTML = html;
  document.body.appendChild(layer.firstElementChild);
}

function suggestEstimate(cat) {

function detectOutlier(taskId) {
  if (!isSmartEnabled()) return false;
  var t = tasks.find(function(x){ return x.id===taskId; }); if (!t || !t.category) return false;
  var stats = getCategoryStats(t.category); if (!stats) return false;
  var last = sprintLog.filter(function(s){ return s.task_id===taskId; }).pop();
  if (!last || last.actual_minutes <= stats.median * 2 || last.actual_minutes <= 30) return false;
  return { actual: last.actual_minutes, median: stats.median, count: stats.count };
}
function isSmartEnabled() {
  var cats = {};
  sprintLog.forEach(function(s){ if (s.task_category) cats[s.task_category] = (cats[s.task_category]||0)+1; });
  for (var k in cats) { if (cats[k] >= 5) return true; }
  return false;
}

function getCategoryStats(cat) {
  var records = sprintLog.filter(function(s){ return s.actual_minutes > 0 && s.task_category === cat; });
  if (records.length < 5) return null;
  var sorted = records.map(function(r){ return r.actual_minutes; }).sort(function(a,b){ return a-b; });
  return { median: sorted[Math.floor(sorted.length/2)], count: records.length, min: sorted[0], max: sorted[sorted.length-1] };
}
function suggestEstimate(cat) {
  var stats = getCategoryStats(cat);
  return stats ? { minutes: stats.median, count: stats.count, range: stats.min+'-'+stats.max+'min' } : null;
}

  var last = sprintLog.filter(function(s){ return s.task_id===taskId; }).pop();
  if (!last || last.actual_minutes <= stats.median * 2 || last.actual_minutes <= 30) return false;

}

function confirmSchedule(taskId) {
  var t = tasks.find(function(x){ return x.id===taskId; }); if (!t) return;
  var cap = dailyCapacity.default_minutes || 360;
  var restDays = dailyCapacity.rest_days || [];
  var items = [];
  if (t.substeps && t.substeps.length) {
    t.substeps.forEach(function(ss){ items.push({ name:ss.name, min: ss.est_minutes||ss.max_days*60||30, orig: ss }); });
  } else {
    items.push({ name: t.name, min: t.est_minutes||60, orig: null });
  }
  /* 按原始顺序分配 */
  var d = new Date(TODAY);
  for (var i = 0; i < 10; i++) {
    var ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var usedMinutes = 0;
    tasks.filter(function(x){ return taskActiveOn(x, ds) && x.id !== taskId; }).forEach(function(x){ usedMinutes += x.est_minutes || 0; });
    var rem = Math.max(0, cap - usedMinutes);
    for (var k = items.length-1; k >= 0; k--) {
      if (rem >= items[k].min) {
        if (items[k].orig) {
          items[k].orig.date = ds; items[k].orig.created_date = ds;
        } else {
          t.date = ds; t.created_date = ds;
        }
        rem -= items[k].min;
        items.splice(k,1);
      }
    }
    d.setDate(d.getDate()+1);
    if (!items.length) break;
  }
  save('tasks',tasks);
  renderCalendar(); renderFocusBlock(); toast('已分配');
}

/* 任务在某日期是否可见 */
function taskActiveOn(t, ds) {
  if (t.date === ds) return true;
  if (!t.date || !t.max_days || t.date > ds) return false;
  var dl = new Date(t.date); dl.setDate(dl.getDate()+t.max_days);
  var dk = dl.getFullYear()+'-'+String(dl.getMonth()+1).padStart(2,'0')+'-'+String(dl.getDate()).padStart(2,'0');
  if (ds > dk) return false;
  var start = new Date(t.date);
  var cur = new Date(ds); cur.setDate(cur.getDate()-1);
  while (cur >= start) {
    var cdk = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    var rec = taskRecords[cdk]; if (rec && rec.done && rec.done[String(t.id)]) return false;
    cur.setDate(cur.getDate()-1);
  }
  return true;
}

function getDeadlineText(t) {
  var d = new Date(t.created_date); d.setDate(d.getDate()+t.max_days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getDeadlineTextSS(ss) {
  var d = new Date(ss.created_date); d.setDate(d.getDate()+ss.max_days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getDeadlineInfo(t, ds) {
  if (!t.max_days || !t.created_date) return null;
  var created = new Date(t.created_date);
  if (ds < created.toISOString().slice(0,10)) return null;
  var deadline = new Date(created); deadline.setDate(deadline.getDate() + t.max_days);
  var dk = deadline.getFullYear()+'-'+String(deadline.getMonth()+1).padStart(2,'0')+'-'+String(deadline.getDate()).padStart(2,'0');
  if (ds < dk) return 'normal';
  if (ds === dk) return 'today';
  return 'overdue';
}
function getDeadlineInfoSS(ss, ds) {
  if (!ss.max_days || !ss.created_date) return null;
  var created = new Date(ss.created_date);
  if (ds < created.toISOString().slice(0,10)) return null;
  var deadline = new Date(created); deadline.setDate(deadline.getDate() + ss.max_days);
  var dk = deadline.getFullYear()+'-'+String(deadline.getMonth()+1).padStart(2,'0')+'-'+String(deadline.getDate()).padStart(2,'0');
  if (ds < dk) return 'normal';
  if (ds === dk) return 'today';
  return 'overdue';
}

function toggleTaskStar(id) {

function dayToggleParent(ds, id) {
  if (ds < TODAY) return;
  var task = tasks.find(function(t){return t.id===id;}); if (!task) return;
  if (task.substeps && task.substeps.length) {
    var tr = taskRecords[ds]; if (!tr||!(tr.substeps||{})[id]) { toast('请先完成所有子任务'); return; }
    var allDone = task.substeps.every(function(ss,si){ return (tr.substeps[id]||{})[si]||false; });
    if (!allDone) { toast('请先完成所有子任务'); return; }
  }
  dayToggleTask(ds, id);
}
function dayToggleTask(ds, id) {
  if (ds < TODAY) return;
  var tr = taskRecords[ds]; if (!tr) { tr = {done:{},points:{}}; taskRecords[ds] = tr; }
  var key = String(id);
  if (tr.done[key]) {
    tr.done[key] = false;
    var pts = tr.points[key]||0; tr.points[key] = 0;
    if (pointRecords[ds]){pointRecords[ds]=Math.max(0,(pointRecords[ds]||0)-pts);save('point_records',pointRecords);}
    var t = tasks.find(function(t){return t.id===id;});
    if (t) { t.completed_date = null; save('tasks',tasks); }
  } else {
    tr.done[key] = true;
    var pts = (settings.points_rules.daily_task||10); tr.points[key] = pts;
    addPoints(pts,'task_'+ds+'_'+id);
    var t2 = tasks.find(function(t){return t.id===id;});
    if (t2) { t2.completed_date = ds; save('tasks',tasks); }
  }
  save('task_records',taskRecords);
  /* 先更新当前页，其余延迟 */
  if (currentTab === 'day') renderDayDetail();
  if (currentTab === 'calendar') renderCalendar();
  setTimeout(function(){ updatePointsUI(); }, 100);
}
function dayToggleSubstep(ds, taskId, si) {
  if (ds < TODAY) return;
  var tr = taskRecords[ds]; if (!tr) { tr = {done:{},substeps:{}}; taskRecords[ds] = tr; }
  if (!tr.substeps) tr.substeps = {}; if (!tr.substeps[taskId]) tr.substeps[taskId] = {};
  tr.substeps[taskId][si] = !tr.substeps[taskId][si];
  var task = tasks.find(function(t){return t.id===taskId;});
  if (task && task.substeps && task.substeps.length) {
    var allDone = task.substeps.every(function(ss,i){ return (tr.substeps[taskId]||{})[i]||false; });
    tr.done[String(taskId)] = allDone;
    if (allDone) { if (!tr.points) tr.points = {}; tr.points[String(taskId)] = (settings.points_rules.daily_task||10); }
    else { if (tr.points) tr.points[String(taskId)] = 0; }
  }
  save('task_records',taskRecords);
  renderDayDetail(); renderFocusBlock(); renderCalendar();
}

function updateFocusDisplay(rem) {
  if (rem === undefined) {
    rem = Math.max(0, focusTotalSec - Math.floor((Date.now() - focusStartTime) / 1000));
  }
  var overtime = rem <= 0 && !focusResting;
  var stopEl = document.getElementById('focusStopGroup');
  if (stopEl) stopEl.style.display = overtime ? '' : 'none';
  if (overtime) rem = Math.floor((Date.now() - focusStartTime) / 1000) - focusTotalSec;
  var m = Math.floor(Math.abs(rem) / 60), s = Math.abs(rem) % 60;
  var el = focusResting ? document.getElementById('focusRestTimer') : document.getElementById('focusTimer');
  if (el) el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  var prog = rem / focusTotalSec, offset = FOCUS_CIRC * (1 - prog);
  var ringId = focusResting ? 'focusRestRing' : 'focusRing';
  var ring = document.getElementById(ringId);
  if (ring) {
    ring.setAttribute('stroke-dashoffset', offset);
    ring.style.opacity = 0.3 + prog * 0.7;
    ring.style.stroke = prog > 0.5 ? '#d4a854' : (prog > 0.2 ? '#e08040' : '#c44a4a');
  }
}

function buildHeatmap(view) {
  var weeks = 4, today = new Date(TODAY), cols = 7;
  var startDate = new Date(today); startDate.setDate(today.getDate() - (weeks*7-1));
  /* 汇总每天分钟 */
  var dailyMin = {};
  sprintLog.filter(function(s){ return s.actual_minutes > 0; }).forEach(function(s){
    dailyMin[s.date] = (dailyMin[s.date]||0) + (s.actual_minutes||0);
  });
  var maxMin = 1; Object.values(dailyMin).forEach(function(v){ maxMin = Math.max(maxMin,v); });
  var html = '<div style="display:flex;gap:3px;">';
  var headers = ['一','二','三','四','五','六','日'];
  html += '<div style="display:flex;flex-direction:column;gap:3px;"><div class="fstab" style="width:20px;visibility:hidden;">w</div>';
  for (var w = 0; w < weeks; w++) html += '<div class="fstab" style="width:20px;font-size:9px;padding:0;text-align:center;">'+(weeks-w)+'w</div>';
  html += '</div>';
  for (var col = 0; col < cols; col++) {
    html += '<div style="display:flex;flex-direction:column;gap:3px;">';
    html += '<div class="fstab" style="width:22px;font-size:9px;padding:0;text-align:center;">'+headers[col]+'</div>';
    for (var w2 = weeks-1; w2 >= 0; w2--) {
      var d = new Date(startDate); d.setDate(startDate.getDate() + w2*7 + col);
      var ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      var v = dailyMin[ds]||0, pct = v/maxMin, intensity = Math.floor(pct*4);
      var colors = ['#2a2d38','#3a3528','#5a4a30','#8a6a38','#d4a854'];
      html += '<div class="fstab" style="width:22px;height:16px;padding:0;background:'+colors[intensity]+';border-radius:2px;font-size:7px;line-height:16px;color:'+(intensity>2?'#1e2130':'#7a7060')+';" title="'+ds+': '+(v||0)+'min">'+(v||'')+'</div>';
    }
    html += '</div>';
  }
  html += '</div><div style="display:flex;gap:3px;justify-content:flex-end;font-size:9px;color:#5a5850;margin-top:4px;">少 <span style="display:flex;gap:2px;">'+['#2a2d38','#3a3528','#5a4a30','#8a6a38','#d4a854'].map(function(c){return '<span style="width:10px;height:10px;background:'+c+';border-radius:2px;"></span>';}).join('')+'</span> 多</div>';
  view.innerHTML = html;
}
function buildTrend(view) {
  var days = 30, html = '<div style="display:flex;align-items:flex-end;gap:2px;height:100px;justify-content:center;">';
  var maxMin = 1;
  for (var i = days-1; i >= 0; i--) {
    var d = new Date(TODAY); d.setDate(d.getDate()-i);
    var ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var v = 0;
    sprintLog.filter(function(s){ return s.date===ds; }).forEach(function(s){ v += s.actual_minutes||0; });
    maxMin = Math.max(maxMin, v);
  }
  for (var i2 = days-1; i2 >= 0; i2--) {
    var d2 = new Date(TODAY); d2.setDate(d2.getDate()-i2);
    var ds2 = d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');
    var v2 = 0;
    sprintLog.filter(function(s){ return s.date===ds2; }).forEach(function(s){ v2 += s.actual_minutes||0; });
    var h = Math.max(2, Math.round(v2/maxMin*80));
    var isToday = ds2 === TODAY;
    html += '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">';
    html += '<div style="font-size:9px;color:var(--muted);">'+(v2||'')+'</div>';
    html += '<div style="width:8px;height:'+h+'px;background:'+(isToday?'#d4a854':'#4a5a6a')+';border-radius:3px;min-height:2px;"></div>';
    if (i2%5===0) html += '<div style="font-size:8px;color:#5a5850;">'+(d2.getMonth()+1)+'/'+d2.getDate()+'</div>';
    html += '</div>';
  }
  html += '</div><div style="text-align:center;font-size:10px;color:var(--muted);margin-top:4px;">近 30 天 · 合计 '+sprintLog.reduce(function(s,x){return s+(x.actual_minutes||0);},0)+' min</div>';
  view.innerHTML = html;
}
function buildTimeDist(view) {
  var hours = new Array(24).fill(0);
  sprintLog.forEach(function(s){
    if (s.start_time) { var h = parseInt(s.start_time.split(':')[0]) || 0; hours[h] += s.actual_minutes||0; }
  });
  var maxH = Math.max(1, Math.max.apply(null, hours));
  var html = '<div style="display:flex;align-items:flex-end;gap:1px;height:80px;justify-content:center;">';
  for (var i = 6; i < 24; i++) {
    var barH = Math.max(2, Math.round(hours[i]/maxH*60));
    var peak = hours[i] >= maxH*0.7;
    html += '<div style="display:flex;flex-direction:column;align-items:center;gap:1px;">';
    html += '<div style="width:10px;height:'+barH+'px;background:'+(peak?'#d4a854':'#4a5a6a')+';border-radius:3px;min-height:1px;"></div>';
    if (i%3===0) html += '<div style="font-size:8px;color:#5a5850;">'+i+'h</div>';
    html += '</div>';
  }
  html += '</div><div style="text-align:center;font-size:10px;color:var(--muted);margin-top:4px;">06:00 - 23:00 专注时段分布</div>';
  view.innerHTML = html;
}

function addShopReward() {

function redeemReward(i) {

// ====== 连续习惯 ======
function computeHabit(h) {
  if (!h.start_date || !h.end_date) return {done:0,total:0,pct:0};
  var start = new Date(h.start_date), end = new Date(h.end_date);
  var totalDays = Math.floor((end - start) / 86400000) + 1; if (totalDays <= 0 || isNaN(totalDays)) return {done:0,total:0,pct:0};
  var done = 0, d = new Date(start);
  while (d <= end) {
    var dk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if ((habitRecords[dk]||{})[h.id]) done++;
    d.setDate(d.getDate()+1);
  }
  var pct = Math.round(done / totalDays * 100);
  var bonusKey = 'bonus_'+h.id+'_'+h.end_date;
  if (pct >= 100 && !habitRewards[bonusKey]) { habitRewards[bonusKey] = true; save('habit_rewards',habitRewards); addPoints(10, 'habit_bonus_'+h.id); toast((h.icon||'')+' '+h.name+' 全部完成！+10分'); }
  return {done:done,total:totalDays,pct:pct};
}
function toggleHabitDay(hid) {
  if (!habitRecords[TODAY]) habitRecords[TODAY] = {};
  if (!habitPointAwarded[TODAY]) habitPointAwarded[TODAY] = {};
  if (habitRecords[TODAY][hid]) {
    habitRecords[TODAY][hid] = false;
    if (habitPointAwarded[TODAY][hid] && pointRecords[TODAY]) { pointRecords[TODAY] = Math.max(0,(pointRecords[TODAY]||0)-1); save('point_records',pointRecords); updatePointsUI(); }
    habitPointAwarded[TODAY][hid] = false;
  } else {
    habitRecords[TODAY][hid] = true;
    if (!habitPointAwarded[TODAY][hid]) { habitPointAwarded[TODAY][hid] = true; addPoints(1, 'habit_'+hid+'_'+TODAY); }
  }
  save('habit_records',habitRecords); save('habit_point_awarded',habitPointAwarded);
  renderFocusBlock();
  if (currentTab === 'notifications') renderRemindersPage();
}

    var idx = notificationLog.length - 1 - i;
    html += '<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;justify-content:space-between;align-items:flex-start;">';
    html += '<div><strong>'+esc(n.title)+'</strong> <span class="muted">'+n.timestamp+'</span><br>'+esc(n.message)+'</div>';
    html += '<button class="delete-btn" onclick="deleteNotif('+idx+')" style="flex-shrink:0;">×</button></div>';
    if (!n.read){n.read=true;}
  });
  var target = document.getElementById('homeNotifLog'); if (target) target.innerHTML = html || '<p class="muted">暂无通知</p>';
  save('notification_log',notificationLog); updateNotifBadge();
}
function clearAllNotif() { if (confirm('清空所有通知？')) { notificationLog = []; save('notification_log',notificationLog); renderNotifLog(); } }
function deleteNotif(i) { notificationLog.splice(i,1); save('notification_log',notificationLog); renderNotifLog(); }
function startReminderEngine() {
  if (!reminderSettings.enabled) return;
  checkReminders(); setInterval(checkReminders, 30000);
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible')checkReminders(); });
}
function checkReminders() {
  var now = new Date(), cur = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'), today = TODAY;
  if (reminderSettings.last_check !== today) {
    reminders.forEach(function(r){ if(r.type==='event') r.notified = false; });
    save('reminders',reminders); reminderSettings.last_check = today; save('reminder_settings',reminderSettings);
  }
  reminders.filter(function(r){return r.type==='habit' && r.time===cur;}).forEach(function(h){
    showNotification('habit',h.name,'该做「'+h.name+'」了');
  });
  reminders.filter(function(r){return r.type==='event';}).forEach(function(e){
    if (e.date===today && e.time===cur && !e.notified) { showNotification('event',e.name,'预定: '+e.time,e.id); e.notified=true; save('reminders',reminders); }
    if (e.date===today && e.time && e.advance_minutes) {
      var eventMin = parseInt(e.time.split(':')[0])*60+parseInt(e.time.split(':')[1]);
      var advMin = eventMin - e.advance_minutes;
      var curMin = now.getHours()*60+now.getMinutes();
      if (curMin === advMin && !e._advanceNotified) { showNotification('event','提前提醒',e.name+' 还有'+e.advance_minutes+'分钟',e.id); e._advanceNotified = true; save('reminders',reminders); }
    }
  });
  if (reminderSettings.golden_time_reminders) {
    var msgs = {morning_focus:{title:'10:00',body:'列出最重要的，趁精力最好的时候做'},lunch_prep:{title:'11:30',body:'准备好简餐'},after_lunch:{title:'12:30',body:'选一件小事帮大脑重启'},wrap_up:{title:'15:00',body:'回顾完成事项'}};
    for (var k in goldenTimes) { if (goldenTimes[k]===cur) showNotification('golden',msgs[k].title,msgs[k].body); }
  }
}
function showNotification(type, title, msg, eventId) {
  var id = Date.now(); notificationLog.unshift({id:id,type:type,title:title,message:msg,timestamp:new Date().toTimeString().slice(0,5),read:false});
  if (notificationLog.length > 50) notificationLog.length = 50; save('notification_log',notificationLog); updateNotifBadge();
  var banner = document.createElement('div'); banner.className = 'notif-banner';
  banner.innerHTML = '<span class="msg"><strong>'+esc(title)+'</strong> '+esc(msg)+'</span><div class="actions">';
  if (eventId) {
    banner.innerHTML += '<button class="btn btn-sm btn-outline" data-eid="'+eventId+'" onclick="confirmNotifEvent(this.getAttribute(\'data-eid\'));this.parentElement.parentElement.remove()">知道了</button>';
  } else {
    banner.innerHTML += '<button class="btn btn-sm btn-outline" onclick="this.parentElement.parentElement.remove()">知道了</button>';
  }
  banner.innerHTML += '<button class="btn btn-sm" onclick="snoozeNotif(\''+type+'\',\''+esc(msg)+'\','+eventId+');this.parentElement.parentElement.remove()">延后5分</button></div>';
  document.getElementById('notifArea').appendChild(banner);
  if (reminderSettings.sound_enabled) playChime();
  /* 重复提醒：取事件自身设置 */
  if (eventId) {
    banner._eid = eventId;
    var evt = reminders.find(function(x){ return x.id===eventId; });
    if (evt) {
      var interval = (evt.repeat_interval||5) * 60000;
      var count = evt.repeat_count||5;
      var repeated = 0;
      banner._repeatTimer = setInterval(function(){
        if (!banner.parentElement) { clearInterval(banner._repeatTimer); return; }
        if (count > 0 && repeated >= count) { clearInterval(banner._repeatTimer); if (banner.parentElement) banner.remove(); return; }
        repeated++;
        if (reminderSettings.sound_enabled) playChime();
      }, interval);
    }
  }
}
function snoozeNotif(type, msg, eventId) {
  setTimeout(function(){ showNotification(type,'延后提醒',msg,eventId); }, 300000);
}
function toggleEventConfirm(id) {
  var r = reminders.find(function(x){ return x.id===id; });
  if (r) { r.confirmed = !r.confirmed; save('reminders',reminders); renderDayDetail(); renderEvents(); updateNotifBadge(); }
}
function confirmNotifEvent(eid) {
  var id = parseFloat(eid);
  var r = reminders.find(function(x){ return x.id===id; });
  if (r) { r.confirmed = true; save('reminders',reminders); renderEvents(); updateNotifBadge(); }
}
function playChime() { try { var ctx = new (window.AudioContext||window.webkitAudioContext)(), osc = ctx.createOscillator(), gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 800; osc.type = 'sine'; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.5); } catch(e){} }
function updateNotifBadge() {
  var todayEvents = reminders.filter(function(r){ return r.type==='event' && r.date===TODAY && !r.confirmed; });
  var count = todayEvents.length;
  var badge = document.getElementById('notifBadge');
  badge.textContent = count > 0 ? count : '';
  if (count > 0) badge.classList.remove('hidden'); else badge.classList.add('hidden');
}
function updateReminder(key, val) { reminderSettings[key] = val==='1'?true:(val==='0'?false:parseInt(val)||5); save('reminder_settings',reminderSettings); }

  var themes = ['默认','森林','暖橙','极简'], thtml = '';
  themes.forEach(function(t){ thtml += '<button class="btn btn-sm '+(settings.theme===t?'':'btn-outline')+'" onclick="setTheme(\''+t+'\')">'+t+'</button>'; });

    '<div class="form-group"><label>凝神完成</label><input type="number" value="'+(rules.sprint_done||5)+'" onchange="updateRule(\'sprint_done\',this.value)" style="width:100px;"></div>';

function setTheme(name) { settings.theme = name; save('settings',settings); applyTheme(name); renderSettings(); }
function updateRule(key, val) { var v = parseInt(val); if (v >= 0) { settings.points_rules[key] = v; save('settings',settings); } }
function toggleFocusItem(item) { var idx = focusModeConfig.items.indexOf(item); if (idx===-1) focusModeConfig.items.push(item); else focusModeConfig.items.splice(idx,1); save('focus_mode_config',focusModeConfig); }
function updateFocusSetting(val) { settings.focus_min = parseInt(val)||25; save('settings',settings); }
function updateLangSetting(val) { window._langBubbleCount = parseInt(val)||5; }

// ====== 数据导入导出 ======
function exportData() {
  var data = {}; for (var i = 0; i < STORAGE.length; i++) { var k = STORAGE.key(i); try { data[k] = JSON.parse(STORAGE.getItem(k)); } catch(e) { data[k] = STORAGE.getItem(k); } }
  var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}), a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup_'+TODAY+'.json'; a.click(); toast('已导出');
}
function importData(event) {
  var file = event.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e){ try { var data = JSON.parse(e.target.result); for (var k in data) { if (data.hasOwnProperty(k)) STORAGE.setItem(k,typeof data[k]==='string'?data[k]:JSON.stringify(data[k])); } location.reload(); } catch(err) { toast('导入失败'); } };
  reader.readAsText(file); event.target.value = '';
}
function clearData() { STORAGE.clear(); location.reload(); }

function promptInstall() { if (window._deferredPrompt) { window._deferredPrompt.prompt(); window._deferredPrompt.userChoice.then(function(r){ if (r.outcome==='accepted') document.getElementById('installBanner').classList.add('hidden'); window._deferredPrompt = null; }); } }
