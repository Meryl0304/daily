var langVocab = load('lang_vocab', []);
var langCurrent = 'en';
var flashQueue = [], flashIdx = 0;

function renderLang() {
  document.querySelectorAll('.lang-tab').forEach(function(t){ t.classList.remove('active'); });
  var tab = document.querySelector('.lang-tab.'+langCurrent); if (tab) tab.classList.add('active');
  var sentences = LANG_DATA[langCurrent] || [];
  var html = '';
  var seed3 = parseInt(TODAY.replace(/-/g,'')) || 1;
  var used = {}, picked = 0;
  for (var i = 0; i < Math.min(5, sentences.length); i++) {
    var idx = Math.floor(((Math.sin(seed3*(i+1))*10000)-Math.floor(Math.sin(seed3*(i+1))*10000)) * sentences.length);
    if (used[idx]) { idx = (idx+1) % sentences.length; if (used[idx]) continue; }
    used[idx] = true;
    var s = sentences[idx];
    html += '<span class="lang-bubble '+langCurrent+'" onclick="showLangDetail(\''+langCurrent+'\','+idx+')">'+esc(s.text)+'</span>';
    picked++;
  }
  document.getElementById('langBubbles').innerHTML = html || '<p class="muted">暂无数据</p>';
  renderVocabList();
}
function showLangDetail(lang, idx) {
  var s = LANG_DATA[lang][idx]; if (!s) return;
  var html = '<div class="event-popup" onclick="if(event.target===this)this.remove()"><div class="shop-celebrate-card">';
  html += '<div style="font-size:20px;font-weight:600;margin-bottom:6px;">'+esc(s.text)+'</div>';
  html += '<div class="muted" style="margin-bottom:4px;">'+esc(s.reading)+'</div>';
  html += '<div style="font-size:14px;margin-bottom:8px;">'+esc(s.translation)+'</div>';
  html += '<div style="font-size:12px;background:var(--incomplete-bg);padding:4px 10px;border-radius:8px;display:inline-block;margin-bottom:12px;">'+esc(s.grammar)+'</div>';
  html += '<div class="actions"><button class="btn btn-sm" onclick="saveToVocab(\''+lang+'\','+idx+');this.parentElement.parentElement.parentElement.remove()">收藏到生词本</button>';
  html += '<button class="btn btn-sm btn-outline" onclick="this.parentElement.parentElement.parentElement.remove()">关闭</button></div>';
  html += '</div></div>';
  var layer = document.createElement('div'); layer.innerHTML = html;
  document.body.appendChild(layer.firstElementChild);
}
function saveToVocab(lang, idx) {
  var s = LANG_DATA[lang][idx]; if (!s) return;
  if (!langVocab.some(function(v){ return v.text===s.text; })) {
    langVocab.push({lang:lang,text:s.text,reading:s.reading,translation:s.translation,added:TODAY});
    save('lang_vocab',langVocab);
    renderVocabList(); toast('已收藏');
  } else { toast('已在生词本中'); }
}
function renderVocabList() {
  var html = '';
  if (!langVocab.length) { document.getElementById('langVocab').innerHTML = '<p class="muted" style="margin-top:8px;">生词本空空如也</p>'; return; }
  langVocab.forEach(function(v,i){
    html += '<div class="lang-vocab-item"><span class="lv-tag '+v.lang+'">'+v.lang.toUpperCase()+'</span><span class="lv-word">'+esc(v.text)+'</span><span class="muted">'+esc(v.translation)+'</span><span class="lv-del" onclick="deleteVocab('+i+');renderVocabList()">×</span></div>';
  });
  document.getElementById('langVocab').innerHTML = '<div style="font-size:12px;color:var(--muted);margin-bottom:4px;">生词本 ('+langVocab.length+')</div>'+html;
}
function deleteVocab(i) { langVocab.splice(i,1); save('lang_vocab',langVocab); }
function addVocabWord() {
  var lang2 = document.getElementById('langAddLang').value;
  var word = document.getElementById('langAddWord').value.trim();
  var meaning = document.getElementById('langAddMeaning').value.trim();
  if (!word || !meaning) return;
  langVocab.push({lang:lang2,text:word,reading:'',translation:meaning,added:TODAY});
  save('lang_vocab',langVocab);
  document.getElementById('langAddWord').value = ''; document.getElementById('langAddMeaning').value = '';
  renderVocabList(); toast('已添加');
}
function switchLang(l) { langCurrent = l; renderLang(); }
function startFlashReview() {
  if (!langVocab.length) { toast('生词本还是空的'); return; }
  flashQueue = langVocab.slice().sort(function(){ return Math.random()-.5; });
  flashIdx = 0;
  document.getElementById('langReviewCard').style.display = '';
  showFlashcard();
}
function showFlashcard() {
  if (flashIdx >= flashQueue.length) { document.getElementById('langReviewCard').style.display = 'none'; toast('复习完成！'); return; }
  var v = flashQueue[flashIdx];
  document.getElementById('flashFront').textContent = v.text;
  document.getElementById('flashBack').textContent = v.translation + (v.reading?' ('+v.reading+')':'');
  document.getElementById('flashBack').style.display = 'none';
}
function revealFlashcard() { document.getElementById('flashBack').style.display = ''; }
function nextFlashcard(knew) {
  var v = flashQueue[flashIdx];
  if (!v) { document.getElementById('langReviewCard').style.display = 'none'; toast('复习完成！'); return; }
  if (knew) {
    langVocab = langVocab.filter(function(x){ return x.text !== v.text || x.lang !== v.lang; });
    save('lang_vocab',langVocab);
    flashIdx++;
  } else {
    flashQueue.push(v);
    flashIdx++;
  }
  if (flashIdx >= flashQueue.length) {
    document.getElementById('langReviewCard').style.display = 'none';
    toast(langVocab.length ? '复习完成！还有 '+langVocab.length+' 个词' : '全部掌握！太棒了');
    renderVocabList();
    return;
  }
  showFlashcard();
}
